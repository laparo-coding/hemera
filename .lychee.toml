# Lychee link checker configuration

# Timeout in seconds for HTTP requests
timeout = 30

# List of glob patterns to exclude from checking
exclude_paths = [
  # Build artifacts
  "**/node_modules/**",
  "**/.next/**",
  "**/dist/**",
  "**/build/**",
  # Version control
  "**/.git/**",
  # IDE config
  "**/.vscode/**",
  "**/.idea/**",
  # Local dev
  "**/.env.local",
  "**/backup_restore_temp/**"
]

# HTTP status codes to treat as success
include = []

# Headers to send with requests
[headers]