# Loops.so Email Service Contract

## Service Overview

The Loops service provides transactional email functionality for the Learning Path feature.
Uses [Loops.so](https://loops.so) transactional email API.

## Environment Variables

```env
LOOPS_API_KEY=loops_xxxxxxxxxxxxxxxx
```

## TypeScript Interface

```typescript
// lib/services/loops.ts

export interface LoopsEmailResult {
  success: boolean;
  error?: string;
  messageId?: string;
}

/**
 * Send notification email to admins when a non-qualified booking is created.
 * Called after creating a PRE_BOOKED booking.
 * 
 * Error Handling: Silent degradation - log to Rollbar, never throw
 */
export async function sendPrerequisiteReviewEmail(data: {
  customerName: string;
  customerEmail: string;
  courseName: string;
  courseLevel: 'INTERMEDIATE' | 'ADVANCED';
  missingPrerequisite: 'BEGINNER' | 'INTERMEDIATE';
  bookingId: string;
  adminEmails: string[];
}): Promise<LoopsEmailResult>;

/**
 * Send rejection email to customer when admin rejects a PRE_BOOKED booking.
 * Called after setting booking status to CANCELLED.
 * 
 * Error Handling: Silent degradation - log to Rollbar, never throw
 */
export async function sendBookingRejectedEmail(data: {
  customerEmail: string;
  customerName: string;
  courseName: string;
}): Promise<LoopsEmailResult>;

/**
 * Fetch all admin email addresses from Clerk.
 * Admins have publicMetadata.role = 'admin'
 */
export async function getAdminEmails(): Promise<string[]>;
```

## Loops.so Transactional Email Templates

### Template: `prerequisite-review`

**Trigger**: Non-qualified customer attempts booking
**Recipients**: All admin users (dynamically fetched from Clerk)

**Variables**:
| Variable | Type | Description |
|----------|------|-------------|
| `customer_name` | string | Customer's display name |
| `customer_email` | string | Customer's email address |
| `course_name` | string | Name of the course being booked |
| `course_level` | string | Level of the course (Fortgeschrittene/Masterclass) |
| `missing_prerequisite` | string | Required level (Basis/Fortgeschrittene) |
| `admin_link` | string | URL to review the booking in admin panel |

**Email Content (German)**:
```
Betreff: Buchungsanfrage erfordert Prüfung - {course_name}

Hallo,

Ein Kunde hat versucht, einen Kurs zu buchen, ohne die erforderlichen Voraussetzungen zu erfüllen.

Kunde: {customer_name} ({customer_email})
Kurs: {course_name} ({course_level})
Fehlende Voraussetzung: Mindestens ein abgeschlossener {missing_prerequisite}-Kurs

Bitte prüfen Sie die Buchungsanfrage und entscheiden Sie, ob diese genehmigt oder abgelehnt werden soll.

[Zur Buchung →] {admin_link}

Mit freundlichen Grüßen,
Hemera Academy System
```

### Template: `booking-rejected`

**Trigger**: Admin rejects a PRE_BOOKED booking
**Recipient**: Customer email

**Variables**:
| Variable | Type | Description |
|----------|------|-------------|
| `customer_name` | string | Customer's display name |
| `course_name` | string | Name of the rejected course |

**Email Content (German)**:
```
Betreff: Ihre Buchungsanfrage für {course_name}

Hallo {customer_name},

vielen Dank für Ihr Interesse an unserem Kurs "{course_name}".

Leider können wir Ihre Buchungsanfrage zum jetzigen Zeitpunkt nicht bestätigen. Für diesen Kurs ist der vorherige Abschluss eines Grundkurses erforderlich.

Wir empfehlen Ihnen, zunächst einen unserer Basiskurse zu absolvieren. Danach freuen wir uns, Sie in diesem Kurs begrüßen zu dürfen.

Bei Fragen stehen wir Ihnen gerne zur Verfügung.

Mit freundlichen Grüßen,
Ihr Hemera Academy Team
```

## Error Handling

All Loops.so API calls use silent degradation:

```typescript
try {
  const result = await loops.sendTransactionalEmail({...});
  return { success: true, messageId: result.id };
} catch (error) {
  // Log to Rollbar but don't throw
  serverInstance.error('Loops.so email failed', {
    error: error instanceof Error ? error.message : String(error),
    template: 'prerequisite-review',
    recipient: data.adminEmails[0],
    bookingId: data.bookingId,
  });
  return { success: false, error: error.message };
}
```

