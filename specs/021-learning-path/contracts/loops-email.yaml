## API Reference

### Loops.so SDK Usage

```typescript
import { LoopsClient } from 'loops';

const loops = new LoopsClient(process.env.LOOPS_API_KEY);

// Send transactional email
await loops.sendTransactionalEmail({
  transactionalId: 'prerequisite-review',
  email: adminEmail,
  dataVariables: {
    customer_name: 'Max Mustermann',
    customer_email: 'max@example.com',
    course_name: 'Masterclass Führung',
    course_level: 'Masterclass',
    missing_prerequisite: 'Fortgeschrittene',
    admin_link: 'https://hemera.academy/admin/bookings/abc123',
  },
});
```

### Clerk Admin Query

```typescript
import { clerkClient } from '@clerk/nextjs/server';

const adminEmails = await getAdminEmails();

async function getAdminEmails(): Promise<string[]> {
  const users = await clerkClient.users.getUserList({
    limit: 100,
  });
  
  return users.data
    .filter(user => user.publicMetadata?.role === 'admin')
    .map(user => user.emailAddresses[0]?.emailAddress)
    .filter((email): email is string => !!email);
}
```
