openapi: 3.0.3
info:
  title: Admin Booking Review API
  version: 1.0.0
  description: API for reviewing PRE_BOOKED bookings

paths:
  /api/admin/bookings/pending:
    get:
      operationId: listPendingBookings
      summary: List all PRE_BOOKED bookings awaiting review
      tags:
        - Admin Bookings
      security:
        - ClerkAuth: []
      responses:
        '200':
          description: List of pending bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  requestId:
                    type: string
                    format: uuid
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PendingBooking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/bookings/{bookingId}/review:
    patch:
      operationId: reviewBooking
      summary: Approve or reject a PRE_BOOKED booking
      tags:
        - Admin Bookings
      security:
        - ClerkAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
          description: The booking ID (cuid)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewAction'
      responses:
        '200':
          description: Booking reviewed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  requestId:
                    type: string
                    format: uuid
                  data:
                    type: object
                    properties:
                      booking:
                        $ref: '#/components/schemas/ReviewedBooking'
                      emailSent:
                        type: boolean
                        description: Whether rejection email was sent (only for reject action)
        '400':
          description: Invalid action or booking not in PRE_BOOKED status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ClerkAuth:
      type: http
      scheme: bearer
      description: Clerk session token with admin role

  schemas:
    ReviewAction:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [approve, reject]
          description: |
            - approve: Change status to PENDING (customer can proceed to payment)
            - reject: Change status to CANCELLED and send rejection email

    PendingBooking:
      type: object
      properties:
        id:
          type: string
          description: Booking ID (cuid)
        createdAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
              nullable: true
            email:
              type: string
              format: email
        course:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            level:
              type: string
              enum: [BEGINNER, INTERMEDIATE, ADVANCED]
        amount:
          type: integer
          description: Amount in cents
        currency:
          type: string
          example: EUR

    ReviewedBooking:
      type: object
      properties:
        id:
          type: string
        paymentStatus:
          type: string
          enum: [PENDING, CANCELLED]
        reviewedAt:
          type: string
          format: date-time
        reviewedBy:
          type: string
          description: Clerk user ID of the admin who reviewed

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        requestId:
          type: string
          format: uuid
        error:
          type: string
        code:
          type: string

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Not authorized (admin role required)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
