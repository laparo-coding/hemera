openapi: 3.0.3
info:
  title: Prerequisite Check API
  version: 1.0.0
  description: Internal service contract for prerequisite verification

paths:
  /internal/prerequisite-check:
    post:
      operationId: checkPrerequisite
      summary: Check if user meets prerequisites for a course level
      description: |
        Internal service function (not an HTTP endpoint).
        Checks if user has completed required courses based on:
        - All email addresses in Clerk account
        - Completed courses (PAID + Participation COMPLETE)
        - Target course level requirements
      tags:
        - Internal Services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrerequisiteCheckRequest'
      responses:
        '200':
          description: Prerequisite check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrerequisiteCheckResult'

components:
  schemas:
    PrerequisiteCheckRequest:
      type: object
      required:
        - clerkUserId
        - targetCourseLevel
      properties:
        clerkUserId:
          type: string
          description: Clerk user ID (e.g., user_xxxxx)
          example: user_2abc123def456
        targetCourseLevel:
          type: string
          enum: [BEGINNER, INTERMEDIATE, ADVANCED]
          description: The level of the course being booked

    PrerequisiteCheckResult:
      type: object
      required:
        - qualified
      properties:
        qualified:
          type: boolean
          description: Whether user meets prerequisites
        missingLevel:
          type: string
          enum: [BEGINNER, INTERMEDIATE]
          nullable: true
          description: The level user needs to complete (null if qualified)
        completedCourses:
          type: array
          items:
            $ref: '#/components/schemas/CompletedCourse'
          description: List of completed courses found

    CompletedCourse:
      type: object
      properties:
        courseId:
          type: string
        courseTitle:
          type: string
        level:
          type: string
          enum: [BEGINNER, INTERMEDIATE, ADVANCED]
        completedAt:
          type: string
          format: date-time
          description: When participation was marked COMPLETE

---
# TypeScript Interface Contract

```typescript
// lib/services/prerequisite.ts

import { CourseLevel } from '@prisma/client';

export interface CompletedCourse {
  courseId: string;
  courseTitle: string;
  level: CourseLevel;
  completedAt: Date;
}

export interface PrerequisiteResult {
  qualified: boolean;
  missingLevel: 'BEGINNER' | 'INTERMEDIATE' | null;
  completedCourses: CompletedCourse[];
}

/**
 * Check if a user meets prerequisites for booking a course at the given level.
 * 
 * Rules:
 * - BEGINNER: Always qualified (no prerequisites)
 * - INTERMEDIATE: Requires at least one BEGINNER course completed
 * - ADVANCED: Requires at least one INTERMEDIATE course completed
 * 
 * "Completed" means:
 * - Booking with paymentStatus = 'PAID'
 * - CourseParticipation with status = 'COMPLETE'
 * 
 * User identification:
 * - Uses ALL email addresses from Clerk account (not just primary)
 * 
 * @param clerkUserId - Clerk user ID
 * @param targetCourseLevel - Level of the course being booked
 * @returns PrerequisiteResult with qualification status
 */
export async function checkPrerequisite(
  clerkUserId: string,
  targetCourseLevel: CourseLevel
): Promise<PrerequisiteResult>;
```

---
# Test Scenarios

## Scenario 1: BEGINNER Course (Always Qualified)
```
Given: Any user
When: Checking prerequisite for BEGINNER course
Then: qualified = true, missingLevel = null
```

## Scenario 2: INTERMEDIATE Course - Not Qualified
```
Given: User with no completed BEGINNER courses
When: Checking prerequisite for INTERMEDIATE course
Then: qualified = false, missingLevel = 'BEGINNER'
```

## Scenario 3: INTERMEDIATE Course - Qualified
```
Given: User with one completed BEGINNER course (PAID + COMPLETE)
When: Checking prerequisite for INTERMEDIATE course
Then: qualified = true, completedCourses contains the BEGINNER course
```

## Scenario 4: ADVANCED Course - Not Qualified (only BEGINNER)
```
Given: User with completed BEGINNER course but no INTERMEDIATE
When: Checking prerequisite for ADVANCED course
Then: qualified = false, missingLevel = 'INTERMEDIATE'
```

## Scenario 5: ADVANCED Course - Qualified
```
Given: User with completed INTERMEDIATE course
When: Checking prerequisite for ADVANCED course
Then: qualified = true, completedCourses contains the INTERMEDIATE course
```

## Scenario 6: Multiple Emails
```
Given: User with primary email "user@example.com" and secondary "work@example.com"
  And: Booking exists for "work@example.com" with completed BEGINNER course
When: Checking prerequisite for INTERMEDIATE course (using primary email login)
Then: qualified = true (found via secondary email)
```

## Scenario 7: PAID but not COMPLETE
```
Given: User with PAID booking for BEGINNER course
  But: Participation status is PREPARATION (not COMPLETE)
When: Checking prerequisite for INTERMEDIATE course
Then: qualified = false (PAID alone is not sufficient)
```
