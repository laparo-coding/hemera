openapi: 3.0.3
info:
  title: Locations API
  description: RESTful API for managing course locations
  version: 1.0.0

servers:
  - url: /api
    description: Next.js API Routes

paths:
  /locations:
    get:
      summary: List all locations
      operationId: listLocations
      tags: [Locations]
      security: []  # Public endpoint
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  locations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  total:
                    type: integer
    
    post:
      summary: Create a new location
      operationId: createLocation
      tags: [Locations]
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationInput'
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /locations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Location ID (CUID)
    
    get:
      summary: Get a single location
      operationId: getLocation
      tags: [Locations]
      security: []  # Public endpoint
      responses:
        '200':
          description: Location details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '404':
          $ref: '#/components/responses/NotFound'
    
    put:
      summary: Update a location
      operationId: updateLocation
      tags: [Locations]
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationInput'
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      summary: Delete a location
      operationId: deleteLocation
      tags: [Locations]
      security:
        - clerkAuth: []
      responses:
        '204':
          description: Location deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Location is referenced by courses
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Location is referenced by courses"
                  code:
                    type: string
                    example: "LOCATION_HAS_REFERENCES"
                  referencingCourses:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string

  /locations/geocode:
    post:
      summary: Geocode an address
      operationId: geocodeAddress
      tags: [Locations]
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, city]
              properties:
                address:
                  type: string
                city:
                  type: string
                zipCode:
                  type: string
      responses:
        '200':
          description: Geocoding result
          content:
            application/json:
              schema:
                type: object
                properties:
                  latitude:
                    type: number
                    nullable: true
                  longitude:
                    type: number
                    nullable: true
                  success:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /locations/by-slug/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        description: Location slug (URL-friendly identifier)
    
    get:
      summary: Get a location by slug
      operationId: getLocationBySlug
      tags: [Locations]
      security: []  # Public endpoint
      responses:
        '200':
          description: Location details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Clerk authentication token

  schemas:
    Location:
      type: object
      required:
        - id
        - slug
        - name
        - address
        - city
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique identifier (CUID)
        slug:
          type: string
          description: URL-friendly identifier
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
          nullable: true
        address:
          type: string
          maxLength: 500
        zipCode:
          type: string
          maxLength: 20
          nullable: true
        city:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          maxLength: 50
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        roomImageUrl:
          type: string
          format: uri
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: float
          nullable: true
          minimum: -180
          maximum: 180
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            courses:
              type: integer
          description: Related counts (optional)

    LocationInput:
      type: object
      required:
        - name
        - address
        - city
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        address:
          type: string
          minLength: 1
          maxLength: 500
        zipCode:
          type: string
          maxLength: 20
        city:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 50
        website:
          type: string
          format: uri
        imageUrl:
          type: string
          format: uri
        roomImageUrl:
          type: string
          format: uri

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: string
                example: "VALIDATION_ERROR"
              details:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    message:
                      type: string

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Authentication required"
              code:
                type: string
                example: "UNAUTHORIZED"

    Forbidden:
      description: Admin access required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Admin access required"
              code:
                type: string
                example: "FORBIDDEN"

    NotFound:
      description: Location not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Location not found"
              code:
                type: string
                example: "NOT_FOUND"
