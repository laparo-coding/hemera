# Course Participation Endpoints Contract

paths:
  /my-courses/{bookingId}/preparation:
    get:
      tags:
        - Courses
      operationId: getPreparation
      summary: Get preparation phase
      description: Returns the preparation phase data for a booking
      security:
        - clerkAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Preparation phase data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PreparationPhase'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Courses
      operationId: updatePreparation
      summary: Update preparation phase
      description: Updates the preparation phase data
      security:
        - clerkAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [IN_PROGRESS, COMPLETED]
                data:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Preparation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

