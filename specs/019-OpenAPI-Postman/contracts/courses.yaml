  /my-courses/{bookingId}/resume:
    get:
      tags:
        - Courses
      operationId: getResume
      summary: Get uploaded resume
      security:
        - clerkAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Resume data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          url:
                            type: string
                            format: uri
                          filename:
                            type: string
                          uploadedAt:
                            type: string
                            format: date-time
    post:
      tags:
        - Courses
      operationId: uploadResume
      summary: Upload resume
      security:
        - clerkAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        '201':
          description: Resume uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
    delete:
      tags:
        - Courses
      operationId: deleteResume
      summary: Delete resume
      security:
        - clerkAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Resume deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
