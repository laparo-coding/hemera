# Admin Endpoints Contract

paths:
  /admin/courses:
    get:
      tags:
        - Admin
      operationId: adminListCourses
      summary: List all courses (admin)
      description: Returns all courses including unpublished (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: includeUnpublished
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: List of all courses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Course'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Admin
      operationId: adminCreateCourse
      summary: Create course
      description: Creates a new course (admin only)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 200
                description:
                  type: string
                price:
                  type: integer
                  minimum: 0
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                locationId:
                  type: string
                  format: cuid
                maxParticipants:
                  type: integer
                  minimum: 1
                isPublished:
                  type: boolean
                  default: false
              required:
                - title
                - price
                - startDate
      responses:
        '201':
          description: Course created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Course'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/courses/create:
    post:
      tags:
        - Admin
      operationId: adminCreateCourseLegacy
      summary: Create course (DEPRECATED)
      deprecated: true
      description: |
        ⚠️ **Deprecated** - Use POST /api/admin/courses instead.
        Sunset: 2026-06-01
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'

  /admin/courses/delete:
    delete:
      tags:
        - Admin
      operationId: adminDeleteCourseLegacy
      summary: Delete course (DEPRECATED)
      deprecated: true
      description: |
        ⚠️ **Deprecated** - Use DELETE /api/admin/courses/{id} instead.
        Sunset: 2026-06-01
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                courseId:
                  type: string
      responses:
        '200':
          description: Course deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'

  /admin/courses/{id}:
    get:
      tags:
        - Admin
      operationId: adminGetCourse
      summary: Get course (admin view)
      description: Returns full course details including enrollments
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Course details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Course'
                          - type: object
                            properties:
                              enrollmentCount:
                                type: integer
                              bookings:
                                type: array
                                items:
                                  $ref: '#/components/schemas/Booking'
        '404':
          description: Course not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Admin
      operationId: adminUpdateCourse
      summary: Update course
      description: Updates course details (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                price:
                  type: integer
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                locationId:
                  type: string
                  format: cuid
                maxParticipants:
                  type: integer
                isPublished:
                  type: boolean
                thumbnailUrl:
                  type: string
                  format: uri
      responses:
        '200':
          description: Course updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Course'
        '404':
          description: Course not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Admin
      operationId: adminDeleteCourse
      summary: Delete course
      description: Deletes a course (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Course deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '404':
          description: Course not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/courses/{id}/transfer-enrollments:
    post:
      tags:
        - Admin
      operationId: adminTransferEnrollments
      summary: Transfer enrollments
      description: Transfers enrollments from one course to another
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetCourseId:
                  type: string
                  format: cuid
              required:
                - targetCourseId
      responses:
        '200':
          description: Enrollments transferred
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          transferredCount:
                            type: integer

  /admin/users:
    get:
      tags:
        - Admin
      operationId: adminListUsers
      summary: List users (admin)
      description: Returns all users (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [USER, ADMIN]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/analytics:
    get:
      tags:
        - Admin
      operationId: getAnalytics
      summary: Get analytics data
      description: Returns platform analytics (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          totalUsers:
                            type: integer
                          totalBookings:
                            type: integer
                          totalRevenue:
                            type: integer
                          recentBookings:
                            type: array
                            items:
                              $ref: '#/components/schemas/Booking'

  /users:
    get:
      tags:
        - Admin
      operationId: listUsers
      summary: List users
      security:
        - clerkAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
    post:
      tags:
        - Admin
      operationId: createUser
      summary: Create user
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
                  enum: [USER, ADMIN]
              required:
                - email
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      tags:
        - Admin
      operationId: getUser
      summary: Get user details
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
    put:
      tags:
        - Admin
      operationId: updateUser
      summary: Update user
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
                  enum: [USER, ADMIN]
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
    delete:
      tags:
        - Admin
      operationId: deleteUser
      summary: Delete user
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'

  /users/profile:
    get:
      tags:
        - Bookings
      operationId: getProfile
      summary: Get current user profile
      security:
        - clerkAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
    put:
      tags:
        - Bookings
      operationId: updateProfile
      summary: Update current user profile
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
