# Locations Endpoints Contract

paths:
  /locations:
    get:
      tags:
        - Public
      operationId: listLocations
      summary: List all locations
      description: Returns all active locations
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Location'
    post:
      tags:
        - Locations
      operationId: createLocation
      summary: Create location
      description: Creates a new location (admin only)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 200
                address:
                  type: string
                city:
                  type: string
                postalCode:
                  type: string
                country:
                  type: string
                  default: Germany
                latitude:
                  type: number
                  format: double
                  minimum: -90
                  maximum: 90
                longitude:
                  type: number
                  format: double
                  minimum: -180
                  maximum: 180
                description:
                  type: string
                capacity:
                  type: integer
                  minimum: 1
                imageUrl:
                  type: string
                  format: uri
              required:
                - name
                - address
                - city
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Location'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /locations/{id}:
    get:
      tags:
        - Public
      operationId: getLocation
      summary: Get location details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Location details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Location'
        '404':
          description: Location not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Locations
      operationId: updateLocation
      summary: Update location
      description: Updates location details (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                city:
                  type: string
                postalCode:
                  type: string
                country:
                  type: string
                latitude:
                  type: number
                  format: double
                longitude:
                  type: number
                  format: double
                description:
                  type: string
                capacity:
                  type: integer
                imageUrl:
                  type: string
                  format: uri
                isActive:
                  type: boolean
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Location'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Location not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Locations
      operationId: deleteLocation
      summary: Delete location
      description: Deletes a location (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Location deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Location not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - Location has associated courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /locations/geocode:
    post:
      tags:
        - Locations
      operationId: geocodeAddress
      summary: Geocode address
      description: |
        Converts address to coordinates using geocoding service.
        Rate limit: 100 req/min
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                  description: Full address string
                city:
                  type: string
                postalCode:
                  type: string
                country:
                  type: string
                  default: Germany
              required:
                - address
      responses:
        '200':
          description: Geocoding result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          latitude:
                            type: number
                            format: double
                          longitude:
                            type: number
                            format: double
                          formattedAddress:
                            type: string
                          confidence:
                            type: number
                            format: float
                            minimum: 0
                            maximum: 1
        '400':
          description: Invalid address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              description: Seconds until rate limit resets
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
