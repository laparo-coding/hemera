# Auth Endpoints Contract

paths:
  /auth/providers:
    get:
      tags:
        - Auth
      operationId: getAuthProviders
      summary: List authentication providers
      description: Returns available authentication providers (Clerk)
      security: []
      responses:
        '200':
          description: List of auth providers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          providers:
                            type: array
                            items:
                              type: object
                              properties:
                                name:
                                  type: string
                                  example: clerk
                                enabled:
                                  type: boolean
                                signInUrl:
                                  type: string
                                  format: uri
