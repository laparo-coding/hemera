openapi: 3.1.0
info:
  title: Admin Users API
  version: 1.0.0
  description: API for managing users in the admin dashboard

servers:
  - url: /api/admin

paths:
  /users:
    get:
      summary: List all users
      description: Returns paginated list of Clerk users with local extensions (outperformer status)
      operationId: listUsers
      tags:
        - Users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: outperformerOnly
          in: query
          description: Filter to show only outperformer users
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{userId}:
    patch:
      summary: Update user
      description: Update user properties (outperformer status, role)
      operationId: updateUser
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete user
      description: Delete a user account (cannot delete self)
      operationId: deleteUser
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
        '400':
          description: Cannot delete self
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    UserListItem:
      type: object
      required:
        - id
        - email
        - fullName
        - role
        - isOutperformer
        - createdAt
      properties:
        id:
          type: string
          description: Clerk user ID
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        fullName:
          type: string
          description: Computed full name or email fallback
        role:
          type: string
          enum: [admin, user]
        isOutperformer:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastSignInAt:
          type: string
          format: date-time
          nullable: true

    UserListResponse:
      type: object
      required:
        - data
        - pagination
        - requestId
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserListItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
        requestId:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        isOutperformer:
          type: boolean
        role:
          type: string
          enum: [admin, user]

    Pagination:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required:
        - error
        - requestId
      properties:
        error:
          type: string
        code:
          type: string
        requestId:
          type: string

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Not authorized (admin required)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
