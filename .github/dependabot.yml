version: 2
updates:
  # NPM dependencies (workspace root)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '05:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    assignees:
      - 'Laparo'
    # reviewers: not supported in dependabot.yml
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '05:30'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    assignees:
      - 'Laparo'
    # reviewers: not supported in dependabot.yml
