name: 'CI: Lighthouse'

on:
  # Manual trigger with URL input (preferred)
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URL to analyze (e.g., Vercel Preview URL)'
        required: true
        type: string
  # Optional: Run on PRs (will skip if no URL is provided via env PREVIEW_URL)
  pull_request:
    branches: ['**']
  # Auto-trigger after deployments update their status (e.g., Vercel GitHub App)
  deployment_status:

permissions:
  contents: read
  pull-requests: write

jobs:
  lhci:
    name: Run Lighthouse on Preview URL
    # Only run for successful deployment statuses; allow manual and PR runs
    if: |
      github.event_name != 'deployment_status' ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install Lighthouse CI
        run: |
          npm i -g @lhci/cli

      - name: Extract preview URL from deployment_status
        if: github.event_name == 'deployment_status'
        run: |
          # Prefer environment_url (actual preview URL); fallback to target_url
          ENV_URL="${{ github.event.deployment_status.environment_url }}"
          TGT_URL="${{ github.event.deployment_status.target_url }}"
          URL="${ENV_URL:-$TGT_URL}"

          # Optional: Only run for non-production environments (commonly 'preview')
          ENV_NAME="${{ github.event.deployment.environment }}"
          if [ "$ENV_NAME" = "Production" ] || [ "$ENV_NAME" = "production" ]; then
            echo "Production deployment detected; skipping Lighthouse auto-run."
            exit 0
          fi

          if [ -n "$URL" ]; then
            echo "PREVIEW_URL=$URL" >> $GITHUB_ENV
            echo "Using URL from deployment_status: $URL"
          else
            echo "No URL found in deployment_status payload; skipping."
            exit 0
          fi

      - name: Determine target URL
        id: target
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          # Preferred: workflow_dispatch input is available as env var INPUT_URL
          if [ -n "$INPUT_URL" ]; then
            echo "url=$INPUT_URL" >> $GITHUB_OUTPUT
          # Fallback: env PREVIEW_URL can be provided by another step or repository env
          elif [ -n "$PREVIEW_URL" ]; then
            echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          else
            echo "No URL provided (INPUT_URL/PREVIEW_URL). Skipping Lighthouse."
            echo "url=" >> $GITHUB_OUTPUT
          fi

      - name: Run Lighthouse CI (collect)
        if: steps.target.outputs.url != ''
        id: collect
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
          # Accept both the preferred shared secret name and the legacy fallback.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        run: |
          BYPASS_TOKEN="${VERCEL_AUTOMATION_BYPASS_SECRET:-$VERCEL_PROTECTION_BYPASS}"
          COOKIE_JAR="$(mktemp)"
          trap 'rm -f "$COOKIE_JAR"' EXIT

          CURL_ARGS=(-sSL --max-time 30 --fail-with-body)
          LHCI_ARGS=(--url "${{ steps.target.outputs.url }}" --config=.lighthouserc.json)

          if [ -z "$BYPASS_TOKEN" ]; then
            echo "Missing Vercel preview bypass secret. Configure VERCEL_AUTOMATION_BYPASS_SECRET or VERCEL_PROTECTION_BYPASS in GitHub Actions secrets." \
              | tee -a "$GITHUB_STEP_SUMMARY"
            echo "skip_vercel_preview=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip_vercel_preview=false" >> "$GITHUB_OUTPUT"

          EXTRA_HEADERS=$(jq -cn --arg token "$BYPASS_TOKEN" '{
            "x-vercel-protection-bypass": $token,
            "x-vercel-set-bypass-cookie": "true"
          }')
          CURL_ARGS+=(
            -c "$COOKIE_JAR"
            -b "$COOKIE_JAR"
            -H "x-vercel-protection-bypass: $BYPASS_TOKEN"
            -H "x-vercel-set-bypass-cookie: true"
          )
          LHCI_ARGS+=(--settings.extraHeaders="$EXTRA_HEADERS")

          if ! RESPONSE_BODY=$(curl "${CURL_ARGS[@]}" "${{ steps.target.outputs.url }}"); then
            echo "Failed to fetch preview URL with bypass headers. Check URL and bypass secret." \
              | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if bash scripts/detect-vercel-protection.sh <<< "$RESPONSE_BODY"; then
            echo "Preview URL still resolves to Vercel protection/login. Aborting Lighthouse to avoid a false-green report." \
              | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          lhci collect "${LHCI_ARGS[@]}"

      - name: Generate HTML report
        if: steps.target.outputs.url != '' && steps.collect.outputs.skip_vercel_preview != 'true'
        run: |
          lhci upload --target=filesystem --outputDir=./lhci-report

      - name: Upload Lighthouse report artifact
        if: always() && steps.target.outputs.url != '' && steps.collect.outputs.skip_vercel_preview != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: ./lhci-report

      - name: Assert thresholds
        if: steps.target.outputs.url != '' && steps.collect.outputs.skip_vercel_preview != 'true'
        run: |
          lhci assert --config=.lighthouserc.json

      - name: Summarize Lighthouse results
        if: always() && steps.target.outputs.url != '' && steps.collect.outputs.skip_vercel_preview != 'true'
        id: summarize
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const cp = require('child_process');
            try {
              const files = cp.execSync('ls -t .lighthouseci/*.json 2>/dev/null || echo ""').toString().trim().split('\n').filter(Boolean);
              if (!files.length || !files[0]) {
                console.log('No Lighthouse JSON files found');
                fs.writeFileSync('lhci-comment.md', '### 🌟 Lighthouse Report\n\nNo report generated (site may be protected by SSO).');
                return;
              }
              const file = files[0];
              const lhr = JSON.parse(fs.readFileSync(file, 'utf8'));
              const c = lhr.categories;
              if (!c) {
                console.log('No categories in Lighthouse report');
                fs.writeFileSync('lhci-comment.md', '### 🌟 Lighthouse Report\n\nNo categories found (Lighthouse may have failed to audit the page).');
                return;
              }
              const pct = s => Math.round(((s?.score) ?? 0) * 100);
              const perf = pct(c.performance);
              const acc = pct(c.accessibility);
              const bp = pct(c['best-practices'] ?? c["best-practices"]);
              const seo = pct(c.seo);
              const url = lhr.requestedUrl;
              const notes = [];
              const crawlabilitySources = lhr.audits['is-crawlable']?.details?.items ?? [];
              if (crawlabilitySources.some(item => item.source === 'x-robots-tag: noindex')) {
                notes.push('SEO includes preview noindex from x-robots-tag.');
              }
              const consoleItems = lhr.audits['errors-in-console']?.details?.items ?? [];
              if (consoleItems.some(item => String(item.description ?? '').includes('x-vercel-protection-bypass'))) {
                notes.push('Best-Practices includes preview bypass header CORS noise.');
              }
              const md = `\n## Lighthouse Summary\n\nURL: ${url}\nScores: Performance ${perf} | Accessibility ${acc} | Best-Practices ${bp} | SEO ${seo}\n`;
              await core.summary.addRaw(md).write();
              const body = [
                `### 🌟 Lighthouse Report`,
                `URL: ${url}`,
                ``,
                `- Performance: ${perf}`,
                `- Accessibility: ${acc}`,
                `- Best-Practices: ${bp}`,
                `- SEO: ${seo}`,
                ...(notes.length ? ['', `Notes:`, ...notes.map(note => `- ${note}`)] : []),
                ``,
                `Artifacts: download the 'lighthouse-report' artifact from this workflow run for the full HTML report.`,
              ].join('\n');
              fs.writeFileSync('lhci-comment.md', body);
              core.setOutput('perf', String(perf));
              core.setOutput('acc', String(acc));
              core.setOutput('url', url);
            } catch (err) {
              console.log('Error processing Lighthouse report:', err.message);
              fs.writeFileSync('lhci-comment.md', `### 🌟 Lighthouse Report\n\nError: ${err.message}`);
            }

      - name: Resolve PR number
        if: always()
        id: prnum
        uses: actions/github-script@v9
        with:
          script: |
            async function resolveBySha(sha) {
              if (!sha) return;
              const { owner, repo } = context.repo;
              const res = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: sha });
              if (res.data && res.data.length) {
                const pr = res.data.find(p => p.state === 'open') || res.data[0];
                core.setOutput('number', pr.number.toString());
              }
            }

            if (context.eventName === 'pull_request') {
              core.setOutput('number', context.payload.pull_request.number.toString());
            } else if (context.eventName === 'deployment_status') {
              await resolveBySha(context.payload.deployment?.sha);
            } else if (context.eventName === 'workflow_dispatch') {
              await resolveBySha(context.sha);
            }

      - name: Post sticky PR comment with Lighthouse summary
        if: always() && steps.prnum.outputs.number != '' && steps.target.outputs.url != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          number: ${{ steps.prnum.outputs.number }}
          header: lighthouse-ci
          path: lhci-comment.md
