name: 'CI: Build & Test'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Lint
        run: npm run lint:ci

      - name: Unit tests
        run: npm run test:unit -- --ci --reporters=default --reporters=jest-junit
        env:
          CI: 'true'

      - name: Contract tests (skipped in CI)
        run: |
          echo "⏭️  Skipping contract tests in CI environment"
          echo "These tests require a running HTTP server and are validated via E2E tests."
          exit 0
        env:
          CI: 'true'

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Save build artifact
        uses: actions/upload-artifact@v7
        with:
          name: webapp-build
          path: .next/**
          if-no-files-found: ignore
