name: 'CI: Build & Test'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Lint
        run: npm run lint:ci

      - name: Unit coverage summary
        run: npm run test:unit:coverage
        env:
          CI: 'true'

      - name: Render coverage summary
        run: |
          set -euo pipefail
          tmp_file='coverage/summary.json.tmp'
          rm -f "$tmp_file"
          if npm run coverage:summary -- --json > "$tmp_file"; then
            mv "$tmp_file" coverage/summary.json
          else
            rm -f "$tmp_file"
            exit 1
          fi

      - name: Enforce baseline coverage floor
        run: npm run coverage:check -- --lines 60 --statements 60 --functions 45 --branches 75

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Save build artifact
        uses: actions/upload-artifact@v7
        with:
          name: webapp-build
          path: .next/**
          if-no-files-found: ignore

      - name: Save coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-pr
          path: coverage/
          if-no-files-found: ignore
