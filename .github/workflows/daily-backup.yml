name: Daily Database Backup

on:
  schedule:
    # Täglich um 03:00 UTC (04:00 MEZ / 05:00 MESZ)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Manueller Trigger für On-Demand Backups
    inputs:
      reason:
        description: 'Grund für manuelles Backup'
        required: false
        default: 'Manuelles Backup'
      environment:
        description: 'Welche Umgebung sichern?'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - production
          - development

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: production
            secret_key: DATABASE_URL
          - env_name: development
            secret_key: DEV_DATABASE_URL

    # Filterung per Step-Level if, da matrix im Job-Level if nicht verfügbar ist
    steps:
      - name: Check Environment Filter
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
          MATRIX_ENV_NAME: ${{ matrix.env_name }}
        run: |
          if [[ "$EVENT_NAME" != "workflow_dispatch" ]] || \
             [[ "$INPUT_ENVIRONMENT" == "both" ]] || \
             [[ "$INPUT_ENVIRONMENT" == "$MATRIX_ENV_NAME" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ $MATRIX_ENV_NAME übersprungen (nur $INPUT_ENVIRONMENT gewählt)"
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Repository
        if: steps.filter.outputs.run == 'true'
        uses: actions/checkout@v7

      - name: Setup Node.js
        if: steps.filter.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Dependencies
        if: steps.filter.outputs.run == 'true'
        run: npm ci

      - name: Check Database URL
        if: steps.filter.outputs.run == 'true'
        id: check_db
        env:
          DB_URL: ${{ secrets[matrix.secret_key] }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "⚠️ Secret ${{ matrix.secret_key }} ist nicht konfiguriert — ${{ matrix.env_name }} Backup übersprungen"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Database Backup with Prisma
        if: steps.filter.outputs.run == 'true' && steps.check_db.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets[matrix.secret_key] }}
          BACKUP_REASON: ${{ github.event.inputs.reason || 'Geplantes tägliches Backup' }}
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M-%S)
          ENV_NAME="${{ matrix.env_name }}"
          BACKUP_DIR="backup_${ENV_NAME}_${DATE}"

          echo "🔄 Starte ${ENV_NAME} Backup für ${DATE}..."
          echo "📋 Backup-Grund: ${BACKUP_REASON}"

          # Run external backup script
          BACKUP_DIR="$BACKUP_DIR" node scripts/ops/backup-db.mjs

          # Create summary file
          echo "{\"date\": \"${DATE}\", \"environment\": \"${ENV_NAME}\", \"reason\": \"${BACKUP_REASON}\"}" > "$BACKUP_DIR/metadata.json"

          # Compress backup
          ARCHIVE_NAME="hemera_backup_${ENV_NAME}_${DATE}.tar.gz"
          tar -czf "$ARCHIVE_NAME" "$BACKUP_DIR"

          # Statistiken ausgeben
          BACKUP_SIZE=$(ls -lh "$ARCHIVE_NAME" | awk '{print $5}')
          FILE_COUNT=$(ls -1 "$BACKUP_DIR"/*.json 2>/dev/null | wc -l)

          echo ""
          echo "✅ ${ENV_NAME} Backup erfolgreich erstellt!"
          echo "📦 Datei: ${ARCHIVE_NAME}"
          echo "📊 Größe: ${BACKUP_SIZE}"
          echo "📁 Tabellen: ${FILE_COUNT}"
          echo "📋 Trigger: ${{ github.event_name }}"

      - name: Upload Backup as Artifact
        if: steps.filter.outputs.run == 'true' && steps.check_db.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: db-backup-${{ matrix.env_name }}-${{ github.run_number }}-${{ github.run_id }}
          path: hemera_backup_*.tar.gz
          retention-days: 30
          compression-level: 0  # Bereits komprimiert

      - name: Backup Summary
        if: steps.filter.outputs.run == 'true' && steps.check_db.outputs.skip != 'true'
        run: |
          echo "## 🗄️ ${{ matrix.env_name }} Datenbank Backup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Eigenschaft | Wert |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Umgebung | **${{ matrix.env_name }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Datum | $(date '+%d.%m.%Y %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏰ Aufbewahrung | 30 Tage |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
          echo "Das Backup kann über den **Artifacts**-Bereich heruntergeladen werden." >> $GITHUB_STEP_SUMMARY
