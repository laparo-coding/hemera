name: Staging — Migration & Smoke Tests

on:
  workflow_dispatch:
    inputs:
      migration_mode:
        description: 'Use manual SQL (manual) or prisma migrate deploy (prisma)'
        required: true
        default: 'prisma'
      deploy_method:
        description: 'Deploy method (repository_dispatch, post-to-cd, or script)'
        required: false
        default: 'repository_dispatch'
      migration_file:
        description: 'Path to SQL migration file (only used when migration_mode=manual)'
        required: false
        default: 'prisma/migrations/20260215140000_add_api_log/migration.sql'

concurrency:
  group: staging-migrate-smoke
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  run:
    name: Run migration → deploy → smoke-tests
    runs-on: ubuntu-latest
    env:
      STAGING_URL: ${{ secrets.STAGING_URL }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Sanity check - print env keys (no secrets)
        run: |
          echo "STAGING_URL=${STAGING_URL:+set}"
          echo "STAGING_DATABASE_URL=${STAGING_DATABASE_URL:+set}"

      - name: Run DB backup (optional)
        if: success()
        env:
          DATABASE_URL: ${{ env.STAGING_DATABASE_URL }}
        run: |
          echo "Starting optional DB dump (requires psql access)."
          if command -v pg_dump >/dev/null 2>&1; then
            mkdir -p /tmp/hemera-backups
            pg_dump "$DATABASE_URL" -Fc -f /tmp/hemera-backups/hemera-staging-$(date +%Y%m%d%H%M).dump || true
          else
            echo "pg_dump not available on runner; skipping dump."
          fi

      - name: Apply migration
        id: migrate
        env:
          MIGRATION_MODE: ${{ github.event.inputs.migration_mode || 'prisma' }}
          MIGRATION_FILE_INPUT: ${{ github.event.inputs.migration_file || 'prisma/migrations/20260215140000_add_api_log/migration.sql' }}
        run: |
          echo "Applying migration via mode: ${MIGRATION_MODE}"
          if [ "${MIGRATION_MODE}" = 'manual' ]; then
            if [ -z "${STAGING_DATABASE_URL}" ]; then
              echo "STAGING_DATABASE_URL not set; aborting"; exit 1
            fi
            MIGRATION_FILE="$MIGRATION_FILE_INPUT"
            if [ ! -f "$MIGRATION_FILE" ]; then
              echo "Migration file not found: $MIGRATION_FILE"; exit 1
            fi
            psql "$STAGING_DATABASE_URL" -f "$MIGRATION_FILE"
          else
            # prisma migrate deploy will apply migrations known to Prisma
            DATABASE_URL="$STAGING_DATABASE_URL" npx prisma migrate deploy --schema=prisma/schema.prisma
          fi

      - name: Deploy branch to staging (CD trigger)
        if: success()
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_ENDPOINT: ${{ secrets.DEPLOY_ENDPOINT }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_METHOD: ${{ github.event.inputs.deploy_method || 'repository_dispatch' }}
        run: |
          method="${DEPLOY_METHOD}"
          echo "Selected deploy method: $method"

          if [ "$method" = 'repository_dispatch' ]; then
            # Trigger repository_dispatch on the same repo with event_type 'staging-deploy'
            echo "Triggering repository_dispatch event 'staging-deploy'"
            curl -sSf -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token $GITHUB_TOKEN" \
              https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches \
              -d "$(jq -n --arg ref "${GITHUB_REF##*/}" --arg actor "${GITHUB_ACTOR}" '{"event_type":"staging-deploy","client_payload":{"ref":$ref,"actor":$actor}}')"
          elif [ "$method" = 'post-to-cd' ]; then
            if [ -z "$DEPLOY_ENDPOINT" ]; then
              echo "DEPLOY_ENDPOINT is not set; aborting"; exit 1
            fi
            echo "Calling DEPLOY endpoint $DEPLOY_ENDPOINT"
            curl -sSf -X POST "$DEPLOY_ENDPOINT" \
              -H "Authorization: Bearer $DEPLOY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg ref "${GITHUB_REF##*/}" --arg actor "${GITHUB_ACTOR}" '{"ref":$ref,"actor":$actor}')"
          else
            # Fallback to local script if present
            if [ -x ./scripts/deploy-to-staging.sh ]; then
              ./scripts/deploy-to-staging.sh "${GITHUB_REF##*/}"
            else
              echo "No deploy action available for method: $method"; exit 1
            fi
          fi

      - name: Upload DB backup artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hemera-staging-backup
          path: /tmp/hemera-backups/
          if-no-files-found: ignore
          retention-days: 7

      - name: Wait for staging health check
        run: |
          echo "Waiting for staging to become healthy..."
          for i in $(seq 1 30); do
            if curl -sSf "${STAGING_URL}/api/health" > /dev/null 2>&1; then
              echo "Staging is healthy after $i attempts"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 10s..."
            sleep 10
          done
          echo "Staging health check timed out after 30 attempts"
          exit 1

      - name: Run smoke tests
        env:
          SERVICE_USER_TOKEN: ${{ secrets.SERVICE_USER_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          chmod +x ./scripts/staging-smoke.sh || true
          ./scripts/staging-smoke.sh

      - name: Report completion
        run: echo "Staging migration+smoke workflow finished"
