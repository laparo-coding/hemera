name: Vercel Guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check if Vercel secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping: VERCEL_TOKEN not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Run Vercel Guard
        if: steps.check-secrets.outputs.skip != 'true'
        run: node scripts/ops/vercel-guard.mjs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # Git auto-deployments were disabled on 2025-10-20; only enforce against newer runs.
          VERCEL_GUARD_GIT_ENFORCE_AFTER: '2025-10-20T00:00:00Z'
