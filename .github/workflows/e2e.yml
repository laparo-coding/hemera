name: 'E2E: Tests'

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Base URL for E2E (e.g., https://hemera-<preview>.vercel.app)'
        required: false
      ref:
        description: 'Git ref or branch to checkout'
        required: false
  pull_request:
    types: [opened, synchronize, reopened]
  deployment_status:

jobs:
  check-frontend-changes:
    name: Check Frontend Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      has_frontend_changes: ${{ steps.check.outputs.has_frontend_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for frontend changes
        id: check
        run: |
          frontend_patterns=(
            'app/.*\.(tsx|jsx)$'
            'components/.*\.(tsx|jsx|ts|js)$'
            'public/.*'
            'styles/.*\.(css|scss|sass)$'
          )
          exclude_patterns=(
            'app/api/.*'
          )
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.sha }})
          else
            changed_files=$(git diff --name-only HEAD~1 HEAD)
          fi
          has_frontend_changes=false
          while IFS= read -r file; do
            excluded=false
            for exclude_pattern in "${exclude_patterns[@]}"; do
              if echo "$file" | grep -qE "$exclude_pattern"; then
                excluded=true
                break
              fi
            done
            if [ "$excluded" = true ]; then
              continue
            fi
            for pattern in "${frontend_patterns[@]}"; do
              if echo "$file" | grep -qE "$pattern"; then
                echo "Found frontend change: $file"
                has_frontend_changes=true
                break 2
              fi
            done
          done <<< "$changed_files"
          echo "has_frontend_changes=$has_frontend_changes" >> "$GITHUB_OUTPUT"
          echo "Frontend changes detected: $has_frontend_changes"

  e2e:
    runs-on: ubuntu-latest
    needs: [check-frontend-changes]
    if: |
      (github.event_name == 'pull_request' && needs.check-frontend-changes.result == 'success' && needs.check-frontend-changes.outputs.has_frontend_changes == 'true') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hemera_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hemera_e2e"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 20s

    env:
      DATABASE_URL: 'postgresql://postgres:postgres@127.0.0.1:5432/hemera_e2e'
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard

    steps:
      - name: Resolve ref to checkout
        id: ref
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Prisma CLI availability
        run: |
          echo "Checking Prisma CLI version..."
          npx prisma --version || (echo "Prisma CLI not found. Installing..." && npm install && npx prisma --version)
          echo "Prisma CLI is available and ready"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install jq and Postgres client
        run: sudo apt-get update && sudo apt-get install -y jq postgresql-client

      - name: Wait for Postgres to be ready
        env:
          PGPASSWORD: postgres
          PGUSER: postgres
          PGDATABASE: hemera_e2e
          PGHOST: 127.0.0.1
          PGPORT: 5432
        run: |
          echo "Waiting for Postgres service..."
          for i in {1..30}; do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then
              echo "Postgres is ready after $i attempts"
              break
            fi
            echo "Waiting for Postgres... attempt $i/30"
            sleep 2
          done
          psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -c "SELECT 1;" || exit 1

      - name: Determine Base URL
        id: base
        run: |
          if [ -n "${{ inputs.url }}" ]; then
            echo "base=${{ inputs.url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "deployment_status" ]; then
            ENV_URL=$(jq -r '.deployment_status.environment_url // empty' "$GITHUB_EVENT_PATH")
            TARGET=$(jq -r '.deployment_status.target_url // empty' "$GITHUB_EVENT_PATH")
            URL="${ENV_URL:-$TARGET}"
            if [ -n "$URL" ]; then
              if echo "$URL" | grep -qE 'vercel\.app|vercel\.com'; then
                echo "base=http://localhost:3000" >> "$GITHUB_OUTPUT"
              else
                echo "base=$URL" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "base=http://localhost:3000" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "base=http://localhost:3000" >> "$GITHUB_OUTPUT"
          fi

      - name: Check base reachability
        id: basecheck
        run: |
          RAW_BASE="${{ steps.base.outputs.base }}"
          RAW_BASE=${RAW_BASE%/}
          CHECK_URL_API="$RAW_BASE/api/health"
          echo "Checking reachability: $CHECK_URL_API"
          STATUS_API=$(curl -s -o /dev/null -w "%{http_code}" "$CHECK_URL_API" --connect-timeout 5) || STATUS_API=000
          echo "API status: $STATUS_API"
          USE_LOCAL=0
          FINAL_BASE="$RAW_BASE"
          # Status 000 means connection failed, treat as unreachable
          if [ "$STATUS_API" = "000" ] || [ "$STATUS_API" -lt 200 ] || [ "$STATUS_API" -ge 400 ]; then
            echo "URL unreachable (status=$STATUS_API). Using local server."
            USE_LOCAL=1
            FINAL_BASE="http://localhost:3000"
          fi
          echo "use_local=$USE_LOCAL" >> "$GITHUB_OUTPUT"
          echo "final_base=$FINAL_BASE" >> "$GITHUB_OUTPUT"

      - name: Selected base URL
        run: |
          echo "Using base URL: ${{ steps.basecheck.outputs.final_base }} (use_local=${{ steps.basecheck.outputs.use_local }})"

      - name: Setup database schema
        env:
          # Ensure Prisma CLI has explicit DATABASE_URL access
          DATABASE_URL: 'postgresql://postgres:postgres@127.0.0.1:5432/hemera_e2e'
          # Prisma 7 uses prisma.config.ts for datasource configuration
          PRISMA_CONFIG_PATH: './prisma.config.ts'
          # Ensure Prisma generates client without caching issues
          PRISMA_SKIP_ENGINE_CHECK: '1'
        run: |
          echo "DATABASE_URL is set: $([[ -n \"$DATABASE_URL\" ]] && echo 'yes' || echo 'no')"
          echo "Generating Prisma Client..."
          npx prisma generate
          echo "Deploying database migrations..."
          npx prisma migrate deploy
          echo "Running E2E seed script..."
          npx tsx scripts/e2e-seed.ts
          echo "Verifying seed data..."
          npx prisma db execute --stdin <<< "SELECT COUNT(*) AS published_count FROM courses WHERE is_published = true;"

      - name: Start Next.js server in background
        if: steps.basecheck.outputs.use_local == '1'
        run: |
          npm run dev > /tmp/nextjs.log 2>&1 &
          SERVER_PID=$!
          echo "Started Next.js server with PID $SERVER_PID"
          echo "Waiting for server to be ready..."
          for i in {1..60}; do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server is ready after $((i*2)) seconds"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died unexpectedly!"
              cat /tmp/nextjs.log || true
              exit 1
            fi
            echo "Waiting for server... attempt $i/60"
            sleep 2
          done
          if ! curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
            echo "Server failed to start after 120 seconds"
            cat /tmp/nextjs.log || true
            exit 1
          fi
        env:
          NODE_ENV: development
          E2E_TEST: 'true'
          NEXT_PUBLIC_DISABLE_CLERK: '1'
          NEXT_PUBLIC_DISABLE_ROLLBAR: '1'

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.basecheck.outputs.final_base }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          NEXT_PUBLIC_DISABLE_CLERK: '1'
        run: |
          if [ -z "$E2E_TEST_EMAIL" ] || [ -z "$E2E_TEST_PASSWORD" ]; then
            echo "No E2E credentials set - running only chromium-no-auth project"
            npx playwright test --project=chromium-no-auth
          else
            echo "E2E credentials available - running all projects"
            npm run e2e:dev
          fi

      - name: Debug - Check course data
        if: always()
        run: |
          echo "=== Course Debug Information ==="
          if [ -f /tmp/course-debug.json ]; then
            cat /tmp/course-debug.json
          else
            echo "Debug file not found"
          fi
          echo "=== E2E Test Result: ${{ steps.e2e.outcome }} ==="

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: warn

      - name: Comment E2E result on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          BASE_URL: ${{ steps.basecheck.outputs.final_base }}
          OUTCOME: ${{ steps.e2e.outcome }}
        with:
          script: |
            const bodyMarker = '<!-- hemera-e2e-result -->';
            const outcome = process.env.OUTCOME || 'unknown';
            const base = process.env.BASE_URL || 'http://localhost:3000';
            const emoji = outcome === 'success' ? '✅' : (outcome === 'failure' ? '❌' : 'ℹ️');
            const body = `${bodyMarker}\n${emoji} E2E (${outcome}) against ${base}.\n` +
              `Artifacts: see 'playwright-report' in the Actions run.`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            try {
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
              const existing = comments.find(c => (c.user?.type === 'Bot' || c.user?.login?.includes('[bot]')) && c.body?.includes(bodyMarker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } catch (error) {
              console.log('Could not comment on PR:', error.message);
            }

      - name: Fail if tests failed
        if: steps.e2e.outcome == 'failure'
        run: |
          echo "E2E tests failed" >&2
          exit 1
