name: 'Deploy: Production'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target (preview or production)'
        type: choice
        required: true
        default: production
        options:
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Central production alias used for health checks and E2E
  PRODUCTION_ALIAS: https://hemera-tau.vercel.app

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        # ports mapping above
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hemera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hemera_test"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 20s
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      # Use 127.0.0.1:5432 mapping for the Postgres service (force IPv4)
      DATABASE_URL: 'postgresql://postgres:postgres@127.0.0.1:5432/hemera_test'
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Set BUILD_TIME (UTC)
        run: echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres to be ready
        env:
          PGPASSWORD: postgres
          PGUSER: postgres
          PGDATABASE: hemera_test
          PGHOST: 127.0.0.1
          PGPORT: 5432
        shell: bash
        run: |
          echo "Waiting for Postgres service health and connectivity on $PGHOST:$PGPORT..."
          attempts=0
          max_attempts=60 # 60 * 5s = 5 minutes
          until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do
            attempts=$((attempts+1))
            if [[ $attempts -ge $max_attempts ]]; then
              echo "Postgres not ready after $((max_attempts*5)) seconds (pg_isready)." >&2
              echo "\n==== docker ps ===="
              docker ps -a || true
              echo "\n==== postgres logs (best-effort) ===="
              docker logs $(docker ps -aq --filter name=postgres --filter ancestor=postgres:16 | head -n1) 2>/dev/null || true
              exit 1
            fi
            echo "Waiting for Postgres (pg_isready) attempt ${attempts}/${max_attempts} ...";
            sleep 5;
          done
          echo "pg_isready reports ready. Verifying SQL connection..."
          # Verify authentication and database availability
          for i in {1..10}; do
            if psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -c "SELECT 1;" >/dev/null 2>&1; then
              echo "Successfully connected to $PGDATABASE via psql."; break
            fi
            echo "psql connection attempt $i/10 failed, retrying in 3s..."; sleep 3;
            if [[ $i -eq 10 ]]; then
              echo "Failed to connect to Postgres via psql after multiple attempts." >&2
              exit 1
            fi
          done

      - name: Setup database schema
        run: npx prisma migrate deploy

      - name: Type checking
        run: npx tsc --noEmit

      - name: Biome formatting check
        run: npm run format:check

      - name: Biome linting
        run: npm run lint:ci

      - name: Run unit tests (with coverage)
        run: npm run test:unit:coverage -- --runInBand
        env:
          CI: 'true'

      - name: Verify coverage scripts
        run: |
          node -e "const p=require('./package.json'); const scripts=p.scripts??{}; const missing=['coverage:summary','coverage:check'].filter(name => !scripts[name]); if(missing.length>0) throw new Error('Missing required coverage scripts: ' + missing.join(', '));"

      - name: Render coverage summary
        run: |
          set -euo pipefail
          summary_output="$(npm run coverage:summary -- --json)"
          if [ -z "$summary_output" ]; then
            echo 'coverage:summary produced no output' >&2
            exit 1
          fi
          printf '%s\n' "$summary_output" > coverage/summary.raw.txt
          node <<'NODE'
          const fs = require('node:fs');
          const raw = fs.readFileSync('coverage/summary.raw.txt', 'utf8').trim();
          const start = raw.indexOf('{');
          const end = raw.lastIndexOf('}');

          if (start === -1 || end === -1 || end < start) {
            throw new Error('coverage:summary did not emit a JSON object');
          }

          const jsonText = raw.slice(start, end + 1);
          JSON.parse(jsonText);
          fs.writeFileSync('coverage/summary.json', `${jsonText}\n`);
          NODE

      - name: Enforce deploy coverage gate
        run: npm run coverage:check -- --lines 60 --statements 60 --functions 45 --branches 75

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build verification
        run: npm run build
        env:
          BUILD_TIME: ${{ env.BUILD_TIME }}

  # Export a UTC timestamp for BUILD_TIME at workflow start (reusable)
  # Note: This env will be available to subsequent steps as ${{ env.BUILD_TIME }}
  # We define it via a dedicated job to avoid repetition; downstream jobs can still set/override per-step if needed.
  # GitHub Actions does not support dynamic env at workflow root from steps, so we set it in-place in jobs where needed too.

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: quality-gates
    # Run on PRs (including Dependabot), or manual dispatch explicitly targeting preview on any ref
    if: (github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'preview')
    permissions:
      contents: read
      pull-requests: write
      issues: write
    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check Secret Availability
        id: check-secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Skipping preview deployment: Required Vercel secrets not available"
            echo "This is expected for Dependabot PRs due to GitHub Actions security restrictions"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        if: steps.check-secrets.outputs.available == 'true'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        if: steps.check-secrets.outputs.available == 'true'

      - name: Sanitize Vercel Token
        if: steps.check-secrets.outputs.available == 'true'
        run: |
          set -euo pipefail
          token=$(printf %s "${{ secrets.VERCEL_TOKEN }}" | tr -d '"' | tr -d "\n\r\t" | sed -e 's/^ *//' -e 's/ *$//')
          echo "SANITIZED_VERCEL_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Set BUILD_TIME (UTC)
        if: steps.check-secrets.outputs.available == 'true'
        run: echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Pull Vercel Environment Information
        if: steps.check-secrets.outputs.available == 'true'
        run: vercel pull --yes --environment=preview --token="$SANITIZED_VERCEL_TOKEN" --scope="$VERCEL_ORG_ID"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        if: steps.check-secrets.outputs.available == 'true'
        run: vercel build --token="$SANITIZED_VERCEL_TOKEN" --scope="$VERCEL_ORG_ID"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BUILD_TIME: ${{ env.BUILD_TIME }}
          # Conditionally disable Clerk only when required secrets are missing
          # This prevents SSR/prerender errors while maintaining auth when keys are available
          NEXT_PUBLIC_DISABLE_CLERK: ${{ secrets.CLERK_SECRET_KEY == '' && '1' || '0' }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.check-secrets.outputs.available == 'true'
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --archive=tgz --token="$SANITIZED_VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview deployment: ${{ steps.deploy.outputs.url }}'
            })

      - name: Output Preview URL (non-PR)
        if: github.event_name != 'pull_request' && steps.deploy.outputs.url != ''
        run: |
          echo "Preview URL=${{ steps.deploy.outputs.url }}" | tee -a "$GITHUB_STEP_SUMMARY"

  deploy-preview-dependabot:
    name: Deploy Preview (Dependabot)
    runs-on: ubuntu-latest
    needs: quality-gates
    # Run only for Dependabot PRs (skips actual deployment but creates successful status for merge gate)
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      deployments: write

    steps:
      - name: Create deployment
        id: deployment
        uses: actions/github-script@v9
        with:
          script: |
            let deploymentId = null;

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: 'Preview',
              description: 'Dependabot PR - Security bypass (no live deployment)',
              auto_merge: false,
              required_contexts: [],
              production_environment: false,
            }).catch(err => {
              if (err.status === 409) {
                console.log('Deployment already exists, fetching existing deployment');
                // When 409, we need to fetch the existing deployment
                return null;
              }
              throw err;
            });

            if (deployment) {
              deploymentId = deployment.data.id;
              console.log(`Deployment created with ID: ${deploymentId}`);
            } else {
              // Fetch existing deployments for this ref and environment
              const deployments = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha,
                environment: 'Preview',
              });

              if (deployments.data.length > 0) {
                deploymentId = deployments.data[0].id;
                console.log(`Using existing deployment ID: ${deploymentId}`);
              }
            }

            if (deploymentId) {
              core.setOutput('deployment_id', deploymentId);
            }

      - name: Create deployment status (success)
        if: steps.deployment.outputs.deployment_id
        uses: actions/github-script@v9
        with:
          script: |
            const deploymentId = ${{ steps.deployment.outputs.deployment_id }};
            if (!deploymentId) {
              console.log('No deployment ID, skipping status creation');
              return;
            }

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'success',
              description: 'Dependabot PR verified - ready to merge',
              environment_url: `${context.payload.repository.html_url}/actions/runs/${context.runId}`,
            });

            console.log('Deployment status set to success');

      - name: Comment PR
        if: steps.deployment.outputs.deployment_id
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Dependabot security verified - preview deployment bypassed per policy. PR is now mergeable.'
            });

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality-gates
    # Run on push to main, or manual dispatch on main targeting production
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'production')
    # Production deploys on Vercel can take longer (build + finalize). Bump timeout to avoid premature cancellation.
    timeout-minutes: 60
    environment:
      name: Production
      url: https://hemera-tau.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Sanitize Vercel Token
        run: |
          set -euo pipefail
          token=$(printf %s "${{ secrets.VERCEL_TOKEN }}" | tr -d '"' | tr -d "\n\r\t" | sed -e 's/^ *//' -e 's/ *$//')
          echo "SANITIZED_VERCEL_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Set BUILD_TIME (UTC)
        run: echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token="$SANITIZED_VERCEL_TOKEN" --scope="$VERCEL_ORG_ID"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token="$SANITIZED_VERCEL_TOKEN" --scope="$VERCEL_ORG_ID"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BUILD_TIME: ${{ env.BUILD_TIME }}

      - name: Deploy Project Artifacts to Vercel (non-blocking with fallback)
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Starting Vercel production deploy (prebuilt)…"

          # Start the deploy in background - the CLI hangs on "Completing..." for minutes
          # We'll poll the API instead to get the deployment URL
          vercel deploy --prebuilt --prod --token="$SANITIZED_VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --yes > deploy.out 2>&1 &
          deploy_pid=$!

          # Give Vercel CLI a moment to initiate the deployment
          sleep 10

          # Try to extract URL from CLI output (may have printed it already)
          url=""
          if [[ -f deploy.out ]]; then
            cat deploy.out
            if grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' deploy.out | head -n1 >/dev/null 2>&1; then
              url=$(grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' deploy.out | head -n1)
              echo "Found URL in CLI output: $url"
            fi
          fi

          # Poll for deployment via API (more reliable than waiting for CLI)
          if [[ -z "${url}" ]]; then
            echo "Polling Vercel API for latest deployment..."
            for i in {1..30}; do
              api_resp=$(curl -fsSL -H "Authorization: Bearer $SANITIZED_VERCEL_TOKEN" \
                "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=production&limit=1&teamId=${VERCEL_ORG_ID}" 2>/dev/null) || true
              if [[ -n "${api_resp:-}" ]]; then
                deploy_url=$(echo "$api_resp" | jq -r '.deployments[0].url // empty' 2>/dev/null || true)
                deploy_state=$(echo "$api_resp" | jq -r '.deployments[0].state // empty' 2>/dev/null || true)
                deploy_created=$(echo "$api_resp" | jq -r '.deployments[0].created // empty' 2>/dev/null || true)

                echo "Poll $i: state=$deploy_state, url=$deploy_url, created=$deploy_created"

                # Check if this is a recent deployment (within last 5 minutes)
                if [[ -n "${deploy_url:-}" && -n "${deploy_created:-}" ]]; then
                  now=$(date +%s)
                  created_ts=$((deploy_created / 1000))
                  age=$((now - created_ts))

                  if [[ $age -lt 300 ]]; then
                    if [[ "$deploy_url" =~ ^https?:// ]]; then
                      url="$deploy_url"
                    else
                      url="https://$deploy_url"
                    fi
                    echo "Found recent deployment: $url (age: ${age}s)"
                    break
                  fi
                fi
              fi
              sleep 5
            done
          fi

          # Kill the background deploy process - we don't need to wait for "Completing..."
          if kill -0 $deploy_pid 2>/dev/null; then
            echo "Terminating background deploy process (we have the URL)"
            kill $deploy_pid 2>/dev/null || true
          fi

          # Final fallback to production alias
          if [[ -z "${url}" ]]; then
            url="${PRODUCTION_ALIAS}"
            echo "Falling back to known production alias: $url"
          fi

          echo "Deployment candidate URL: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Wait for Deployment Ready
        if: ${{ steps.deploy.outputs.url != '' }}
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        shell: bash
        run: |
          set -euo pipefail

          deployment="$DEPLOY_URL"
          # Extract deployment ID from URL (e.g., hemera-mozu6lfov-laparo-team.vercel.app -> hemera-mozu6lfov)
          deploy_host="${deployment#https://}"
          deploy_host="${deploy_host#http://}"

          echo "Waiting for deployment to be ready: $deployment"

          for i in {1..60}; do
            # Check deployment state via API
            api_resp=$(curl -fsSL -H "Authorization: Bearer $SANITIZED_VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&limit=5&teamId=${VERCEL_ORG_ID}" 2>/dev/null) || true

            if [[ -n "${api_resp:-}" ]]; then
              # Find our deployment by URL
              deploy_state=$(echo "$api_resp" | jq -r --arg host "$deploy_host" '.deployments[] | select(.url == $host) | .readyState // .state' 2>/dev/null | head -n1) || true

              echo "Poll $i: deployment state = $deploy_state"

              if [[ "$deploy_state" == "READY" ]]; then
                echo "✅ Deployment is ready!"
                break
              elif [[ "$deploy_state" == "ERROR" || "$deploy_state" == "CANCELED" ]]; then
                echo "❌ Deployment failed with state: $deploy_state"
                exit 1
              fi
            fi

            if [[ $i -ge 60 ]]; then
              echo "⚠️ Timeout waiting for deployment - proceeding anyway"
              break
            fi

            sleep 5
          done

      - name: Assign Production Alias
        if: ${{ steps.deploy.outputs.url != '' }}
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        shell: bash
        run: |
          set -euo pipefail

          deployment="$DEPLOY_URL"
          if [[ -z "$deployment" ]]; then
            echo "No deployment URL available for alias assignment." >&2
            exit 1
          fi

          # Ensure deployment value includes scheme for the CLI
          if [[ ! "$deployment" =~ ^https?:// ]]; then
            deployment="https://$deployment"
          fi

          # Derive bare domain from configured production alias (strip scheme and path)
          alias_domain="${PRODUCTION_ALIAS#https://}"
          alias_domain="${alias_domain#http://}"
          alias_domain="${alias_domain%%/*}"

          if [[ -z "$alias_domain" ]]; then
            echo "Unable to derive alias domain from PRODUCTION_ALIAS=$PRODUCTION_ALIAS" >&2
            exit 1
          fi

          echo "Assigning alias ${alias_domain} to deployment ${deployment}" | tee -a "$GITHUB_STEP_SUMMARY"
          vercel alias set "$deployment" "$alias_domain" --token="$SANITIZED_VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" >/tmp/vercel-alias.log
          echo "Vercel alias response:" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/vercel-alias.log | tee -a "$GITHUB_STEP_SUMMARY"

          # Also assign custom domain aliases
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Assigning custom domain aliases..." | tee -a "$GITHUB_STEP_SUMMARY"

          for custom_domain in "hemera.academy" "www.hemera.academy"; do
            echo "Assigning alias ${custom_domain} to deployment ${deployment}" | tee -a "$GITHUB_STEP_SUMMARY"
            if vercel alias set "$deployment" "$custom_domain" --token="$SANITIZED_VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"; then
              echo "✅ Alias ${custom_domain} assigned successfully" | tee -a "$GITHUB_STEP_SUMMARY"
            else
              echo "⚠️ Failed to assign alias ${custom_domain} (may already be configured)" | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Poll Deployment Readiness (health check)
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          DEPLOY_ALIAS: ${{ env.PRODUCTION_ALIAS }}
        shell: bash
        run: |
          set -euo pipefail
          url="$DEPLOY_URL"
          alias_url="${DEPLOY_ALIAS:-}"
          if [[ -z "$url" ]]; then
            echo "No DEPLOY_URL provided to polling step." >&2
            exit 1
          fi

          if [[ -z "$alias_url" ]]; then
            echo "No DEPLOY_ALIAS provided; will poll only discovered URL."
          fi

          echo "Polling readiness until healthy..."
          echo "- Discovered URL: ${url}/api/health"
          if [[ -n "$alias_url" && "$alias_url" != "$url" ]]; then
            echo "- Production alias: ${alias_url}/api/health"
          fi
          attempts=0
          max_attempts=80   # ~40 minutes @ 30s interval
          success_streak=0
          required_streak=2 # require two consecutive 200 to avoid transient readiness
          while true; do
            attempts=$((attempts+1))
            code_main=$(curl -s -o /dev/null -w "%{http_code}" "${url%/}/api/health" || true)
            code_alias=""
            if [[ -n "$alias_url" && "$alias_url" != "$url" ]]; then
              code_alias=$(curl -s -o /dev/null -w "%{http_code}" "${alias_url%/}/api/health" || true)
            fi

            if [[ "$code_main" == "200" || "$code_alias" == "200" ]]; then
              success_streak=$((success_streak+1))
              which_ok="$( [[ "$code_main" == "200" ]] && echo main || echo alias )"
              echo "[$attempts] Health OK on $which_ok (200). Streak=${success_streak}/${required_streak}"
              if [[ $success_streak -ge $required_streak ]]; then
                echo "Deployment is healthy."
                break
              fi
            else
              echo "[$attempts] Not ready (main=$code_main alias=${code_alias:-n/a}). Reset streak."
              success_streak=0
            fi

            if [[ $attempts -ge $max_attempts ]]; then
              echo "Deployment did not become healthy within the polling window (~40m)." >&2
              echo "Last observed codes: main=$code_main alias=${code_alias:-n/a}" >&2
              exit 1
            fi
            sleep 30
          done

      - name: Print Deployment URL
        if: always()
        run: |
          echo "Discovered URL=${{ steps.deploy.outputs.url }}" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Production alias=${{ env.PRODUCTION_ALIAS }}" | tee -a "$GITHUB_STEP_SUMMARY"

  check-frontend-changes:
    name: Check Frontend Changes
    runs-on: ubuntu-latest
    outputs:
      has_frontend_changes: ${{ steps.check.outputs.has_frontend_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for frontend changes
        id: check
        run: |
          # Define patterns for frontend files
          # - Pages and layouts in app/ (excluding api/)
          # - Components
          # - Public assets
          # - Styles
          frontend_patterns=(
            'app/.*\.(tsx|jsx)$'
            'components/.*\.(tsx|jsx|ts|js)$'
            'public/.*'
            'styles/.*\.(css|scss|sass)$'
          )

          # Exclude API routes
          exclude_patterns=(
            'app/api/.*'
          )

          # Get changed files
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, compare with base branch
            changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.sha }})
          else
            # For pushes, compare with previous commit
            changed_files=$(git diff --name-only HEAD~1 HEAD)
          fi

          has_frontend_changes=false

          # Check each changed file against patterns
          while IFS= read -r file; do
            # Skip if matches exclude patterns
            excluded=false
            for exclude_pattern in "${exclude_patterns[@]}"; do
              if echo "$file" | grep -qE "$exclude_pattern"; then
                excluded=true
                break
              fi
            done

            if [ "$excluded" = true ]; then
              continue
            fi

            # Check if matches frontend patterns
            for pattern in "${frontend_patterns[@]}"; do
              if echo "$file" | grep -qE "$pattern"; then
                echo "Found frontend change: $file"
                has_frontend_changes=true
                break 2
              fi
            done
          done <<< "$changed_files"

          echo "has_frontend_changes=$has_frontend_changes" >> "$GITHUB_OUTPUT"
          echo "Frontend changes detected: $has_frontend_changes"

  e2e-production:
    name: E2E Tests (Production)
    runs-on: ubuntu-latest
    needs: [deploy-production, check-frontend-changes]
    # Run after production deploy on push to main, or on manual dispatch on main
    # Skip if no frontend changes detected
    if: |
      needs.check-frontend-changes.outputs.has_frontend_changes == 'true' &&
      ((github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'production'))
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests against production
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PRODUCTION_ALIAS }}
          NEXT_PUBLIC_APP_URL: ${{ env.PRODUCTION_ALIAS }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 30

  close-branch:
    name: Close Branch
    runs-on: ubuntu-latest
    needs: [deploy-production, e2e-production]
    # Only on main after production flow completes (push or manual dispatch on main)
    # Always run regardless of e2e-production outcome (it may be skipped)
    if: |
      always() &&
      needs.deploy-production.result == 'success' &&
      (needs.e2e-production.result == 'success' || needs.e2e-production.result == 'skipped') &&
      ((github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'production'))
    steps:
      - name: Close branch after successful production deployment
        run: |
          if [ "${{ needs.e2e-production.result }}" == "skipped" ]; then
            echo "Branch will be closed after successful production build (E2E tests were skipped due to no frontend changes)"
          else
            echo "Branch will be closed after successful production build and E2E tests"
          fi
