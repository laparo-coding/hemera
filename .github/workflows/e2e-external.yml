name: 'E2E: External Smoke'

# This workflow uses optional secrets:
# - PLAYWRIGHT_BASE_URL: Optional base URL for testing (fallback logic in place)
# - VERCEL_TOKEN, VERCEL_PROJECT_ID, VERCEL_ORG_ID: Optional Vercel API access

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test (e.g., https://hemera-academy-preview.vercel.app)'
        required: false
        type: string
      grep:
        description: 'Playwright grep for test selection (regex)'
        required: false
        default: '(seo|academy|courses|health)'
        type: string
      project:
        description: 'Playwright project name'
        required: false
        default: 'public'
        type: string

concurrency:
  group: e2e-ext-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    timeout-minutes: 45
    # Job-level env for optional secrets (avoids step-level validation warnings)
    env:
      PLAYWRIGHT_BASE_URL_SECRET: ${{ secrets.PLAYWRIGHT_BASE_URL }}
      VERCEL_TOKEN_SECRET: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID_SECRET: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID_SECRET: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Resolve Base URL
        id: resolve
        shell: bash
        env:
          BASE_URL_INPUT: ${{ github.event.inputs.base_url }}
          # Uses job-level env vars for optional secrets
          BASE_URL_SECRET: ${{ env.PLAYWRIGHT_BASE_URL_SECRET }}
        run: |
          # Priority: workflow input > secrets
          if [ -n "$BASE_URL_INPUT" ]; then BASE_URL="$BASE_URL_INPUT";
          elif [ "${{ github.event_name }}" = 'deployment_status' ]; then
            BASE_URL=$(node -e "const fs=require('fs'); const event=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,'utf8')); process.stdout.write(event.deployment_status?.environment_url || event.deployment_status?.target_url || '')")
          elif [ -n "$BASE_URL_SECRET" ]; then BASE_URL="$BASE_URL_SECRET";
          else BASE_URL=""; fi

          # If still empty, try to resolve from Vercel Deployments API (preview)
          if [ -z "$BASE_URL" ]; then
            if [ -z "$VERCEL_TOKEN_SECRET" ] || [ -z "$VERCEL_PROJECT_ID_SECRET" ] || [ -z "$VERCEL_ORG_ID_SECRET" ]; then
              echo "No BASE_URL and missing Vercel secrets. Provide 'base_url' input or set PLAYWRIGHT_BASE_URL secret." | tee -a $GITHUB_STEP_SUMMARY
            else
              echo "Attempting to resolve preview URL from Vercel..." | tee -a $GITHUB_STEP_SUMMARY
              export VERCEL_TOKEN="$VERCEL_TOKEN_SECRET"
              export VERCEL_PROJECT_ID="$VERCEL_PROJECT_ID_SECRET"
              export VERCEL_ORG_ID="$VERCEL_ORG_ID_SECRET"
              export SHA='${{ github.sha }}'
              export PR=''
              curl -sSf -H "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=preview&limit=50&state=READY" \
                -o deployments.json || true
              RESOLVED_URL=$(node -e '
                const fs=require("fs");
                let out="";
                try {
                  const data=JSON.parse(fs.readFileSync("deployments.json","utf8"));
                  const sha=process.env.SHA;
                  const pr=process.env.PR;
                  let dep=null;
                  const list = Array.isArray(data.deployments) ? data.deployments : [];
                  // Nur dann matchen, wenn Commit-SHA ODER PR-ID exakt passt – keine Fallbacks
                  dep = list.find(d => d?.meta?.githubCommitSha===sha || (pr && String(d?.meta?.githubPrId||"")===String(pr)));
                  if (dep?.url) out = `https://${dep.url}`;
                } catch {}
                if (out) process.stdout.write(out);
              ')
              if [ -n "$RESOLVED_URL" ]; then
                BASE_URL="$RESOLVED_URL"
                echo "Resolved Vercel preview: $BASE_URL" | tee -a $GITHUB_STEP_SUMMARY
              else
                echo "Could not resolve preview URL from Vercel." | tee -a $GITHUB_STEP_SUMMARY
              fi
            fi
          fi

          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT
          if [ -z "$BASE_URL" ]; then
            echo "No BASE_URL resolved; skipping tests. Provide 'base_url' via workflow_dispatch or configure PLAYWRIGHT_BASE_URL/VERCEL_* secrets." \
              | tee -a $GITHUB_STEP_SUMMARY
          fi

      - name: E2E (external)
        if: steps.resolve.outputs.base_url != ''
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.resolve.outputs.base_url }}
          # disable creating test users in external previews
          E2E_CREATE_USERS: 'false'
          # Optional: provide a Vercel Protection Bypass token to run against SSO-protected previews.
          # Prefer the shared automation secret already used by Lighthouse, but keep the older
          # repo/org secret name as a fallback for backwards compatibility.
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET || secrets.VERCEL_PROTECTION_BYPASS }}
          # SSO tolerant mode: tests should only hit public pages by default via grep
          PLAYWRIGHT_SSO_TOLERANT: '1'
          NODE_ENV: test
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          npx playwright test \
            --project='${{ github.event.inputs.project || 'public' }}' \
            --grep='${{ github.event.inputs.grep || '(seo|academy|courses|health)' }}'

      - name: Upload Playwright report
        if: always() && steps.resolve.outputs.base_url != ''
        uses: actions/upload-artifact@v7
        with:
          name: playwright-external-smoke-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
