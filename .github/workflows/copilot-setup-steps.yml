name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Customize this step as needed
    - name: Build application
      run: npm run build
