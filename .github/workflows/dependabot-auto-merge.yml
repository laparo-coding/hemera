name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, labeled, edited, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  automerge:
    if: >-
      github.actor == 'dependabot[bot]' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for required checks
        uses: lewagon/wait-on-check-action@v1.4.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success
          running-workflow-name: 'automerge'

      - name: Enable auto-merge
        if: ${{ github.event.pull_request.auto_merge == null }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash

      - name: Merge Dependabot PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              core.info(`Merged PR #${pr.number}`);
            } catch (e) {
              core.info(`Skip merge for PR #${pr.number}: ${e.message}`);
            }
