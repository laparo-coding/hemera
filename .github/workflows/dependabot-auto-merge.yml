name: 'Bot: Dependabot Auto-Merge'

on:
  pull_request_target:
    types: [opened, synchronize, labeled, ready_for_review]

# Only run for Dependabot PRs - skip all other actors immediately
concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  # Quick check job to fail fast for non-Dependabot PRs
  check-actor:
    runs-on: ubuntu-latest
    outputs:
      is-dependabot: ${{ steps.check.outputs.is-dependabot }}
    steps:
      - name: Check if Dependabot PR
        id: check
        run: |
          if [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
            echo "is-dependabot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-dependabot=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: Not a Dependabot PR (actor: ${{ github.actor }})"
          fi

  automerge:
    needs: check-actor
    if: |
      needs.check-actor.outputs.is-dependabot == 'true' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      - name: Block major version updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "Major version update detected. Skipping auto-merge."
          exit 1

      - name: Wait for required checks
        uses: lewagon/wait-on-check-action@v1.6.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success
          running-workflow-name: 'automerge'

      - name: Enable auto-merge
        if: ${{ github.event.pull_request.auto_merge == null }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash

      - name: Merge Dependabot PR
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              core.info(`Merged PR #${pr.number}`);
            } catch (e) {
              core.info(`Skip merge for PR #${pr.number}: ${e.message}`);
            }
