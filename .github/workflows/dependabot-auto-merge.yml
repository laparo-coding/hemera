name: 'Bot: Dependabot Auto-Merge'

on:
  pull_request_target:
    types: [opened, synchronize, labeled, ready_for_review]

# Only run for Dependabot PRs - skip all other actors immediately
concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  # Quick check job to fail fast for non-Dependabot PRs
  check-actor:
    runs-on: ubuntu-latest
    outputs:
      is-dependabot: ${{ steps.check.outputs.is-dependabot }}
    steps:
      - name: Check if Dependabot PR
        id: check
        run: |
          if [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
            echo "is-dependabot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-dependabot=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: Not a Dependabot PR (actor: ${{ github.actor }})"
          fi

  automerge:
    needs: check-actor
    if: |
      needs.check-actor.outputs.is-dependabot == 'true' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3

      - name: Block major version updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "Major version update detected. Skipping auto-merge."
          exit 1

      - name: Approve PR
        run: gh pr review "$PR_NUMBER" --approve
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for build-and-test
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          check-name: build-and-test
          allowed-conclusions: success

      - name: Merge Dependabot PR
        run: gh pr merge "$PR_NUMBER" --squash --admin
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
