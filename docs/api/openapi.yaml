      description: Returns full course details including enrollments and bookings.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Course details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Course'
                          - type: object
                            properties:
                              enrollmentCount:
                                type: integer
                              bookings:
                                type: array
                                items:
                                  $ref: '#/components/schemas/Booking'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    patch:
      tags: [Admin]
      operationId: adminUpdateCourse
      summary: Update course
      description: Applies partial updates to course metadata.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                price:
                  type: integer
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                locationId:
                  type: string
                  format: cuid
                maxParticipants:
                  type: integer
                isPublished:
                  type: boolean
                thumbnailUrl:
                  type: string
                  format: uri
      responses:
        '200':
          description: Course updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Course'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    delete:
      tags: [Admin]
      operationId: adminDeleteCourse
      summary: Delete course
      description: Permanently deletes a course by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Course deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
  /admin/courses/{id}/transfer-enrollments:
    post:
      tags: [Admin]
      operationId: adminTransferEnrollments
      summary: Transfer enrollments
      description: Moves enrollments from one course to another.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetCourseId:
                  type: string
                  format: cuid
              required:
                - targetCourseId
      responses:
        '200':
          description: Enrollments transferred
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          transferredCount:
                            type: integer
      security:
        - clerkAuth: []
  /admin/users:
    get:
      tags: [Admin]
      operationId: adminListUsers
      summary: List users (admin)
      description: Returns a filtered list of platform users.
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [USER, ADMIN]
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    post:
      tags: [Admin]
      operationId: createUser
      summary: Create user
      description: Creates a new platform user with optional role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
                  enum: [USER, ADMIN]
              required:
                - email
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
      security:
        - clerkAuth: []
  /users/{id}:
    get:
      tags: [Admin]
      operationId: getUser
      summary: Get user details
      description: Returns user profile details for admin tooling.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
      security:
        - clerkAuth: []
    put:
      tags: [Admin]
      operationId: updateUser
      summary: Update user
      description: Updates user profile attributes or role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                role:
                  type: string
                  enum: [USER, ADMIN]
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
      security:
        - clerkAuth: []
    delete:
      tags: [Admin]
      operationId: deleteUser
      summary: Delete user
      description: Removes the specified user and related role assignments.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      security:
        - clerkAuth: []
  /users/profile:
    get:
      tags: [Bookings]
      operationId: getProfile
      summary: Get current user profile
      description: Returns the authenticated user's profile data.
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    put:
      tags: [Bookings]
      operationId: updateProfile
      summary: Update current user profile
      description: Updates first and last name for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
  /webhooks/stripe:
    post:
      tags: [Webhooks]
      operationId: handleStripeWebhook
      summary: Stripe webhook receiver
      description: Processes Stripe event webhooks secured by signature header.
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                object:
                  type: string
                  enum: [event]
                type:
                  type: string
                data:
                  type: object
                  properties:
                    object:
                      type: object
                created:
                  type: integer
                livemode:
                  type: boolean
                api_version:
                  type: string
              required:
                - id
                - type
                - data
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /webhooks/clerk:
    post:
      tags: [Webhooks]
      operationId: handleClerkWebhook
      summary: Clerk webhook receiver
      description: Handles Clerk lifecycle webhooks signed via Svix headers.
      parameters:
        - name: svix-id
          in: header
          required: true
          schema:
            type: string
        - name: svix-timestamp
          in: header
          required: true
          schema:
            type: string
        - name: svix-signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string }
                data:
                  type: object
                object:
                  type: string
                  enum: [event]
              required:
                - type
                - data
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /vitals:
    get:
      tags: [Monitoring]
      operationId: getVitals
      summary: Get application vitals
      description: Returns health metrics and performance data
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, prometheus]
            default: json
      responses:
        '200':
          description: Vitals data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [healthy, degraded, unhealthy]
                          version:
                            type: string
                          uptime:
                            type: integer
                          memory:
                            type: object
                            properties:
                              used: { type: integer }
                              total: { type: integer }
                              percentage:
                                type: number
                                format: float
                          database:
                            type: object
                            properties:
                              connected: { type: boolean }
                              latency:
                                type: integer
                          cache:
                            type: object
                            properties:
                              connected: { type: boolean }
                              hitRate:
                                type: number
                                format: float
                          timestamp:
                            type: string
                            format: date-time
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Clerk JWT token issued after authentication.
  schemas:
    StandardResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data: {}
        requestId:
          type: string
          format: uuid
      required: [success, requestId]
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - RATE_LIMITED
            - STRIPE_ERROR
            - INTERNAL_ERROR
        requestId:
          type: string
          format: uuid
      required: [success, error, code, requestId]
    Course:
      type: object
      properties:
        id:
          type: string
          format: cuid
        title:
          type: string
          maxLength: 200
        slug:
          type: string
          pattern: ^[a-z0-9-]+$
        description:
          type: string
        price:
          type: integer
          minimum: 0
        currency:
          type: string
          enum: [EUR]
          default: EUR
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        locationId:
          type: string
          format: cuid
          nullable: true
        maxParticipants:
          type: integer
          minimum: 1
        isPublished:
          type: boolean
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - price
        - currency
        - startDate
        - isPublished
    CourseSummary:
      type: object
      properties:
        id:
          type: string
          format: cuid
        title:
          type: string
        slug:
          type: string
        price:
          type: integer
        currency:
          type: string
        startDate:
          type: string
          format: date-time
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        location:
          $ref: '#/components/schemas/LocationSummary'
      required: [id, title, slug, price, startDate]
    Booking:
      type: object
      properties:
        id:
          type: string
          format: cuid
        userId:
          type: string
        courseId:
          type: string
          format: cuid
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED, COMPLETED]
        paymentIntentId:
          type: string
          nullable: true
        stripeSessionId:
          type: string
          nullable: true
        amount:
          type: integer
        currency:
          type: string
          enum: [EUR]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        course:
          $ref: '#/components/schemas/CourseSummary'
      required: [id, userId, courseId, status, createdAt]
    Location:
      type: object
      properties:
        id:
          type: string
          format: cuid
        name:
          type: string
          maxLength: 200
        slug:
          type: string
          pattern: ^[a-z0-9-]+$
        address:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
          default: DE
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, slug, address, city, country]
    LocationSummary:
      type: object
      properties:
        id:
          type: string
          format: cuid
        name:
          type: string
        slug:
          type: string
        city:
          type: string
      required: [id, name, city]
    User:
      type: object
      properties:
        id:
          type: string
          format: cuid
        clerkId:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          type: string
          enum: [USER, ADMIN]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, clerkId, email, role]
    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
      required: [id, email]
    PreparationPhase:
      type: object
      properties:
        bookingId:
          type: string
          format: cuid
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
        completedAt:
          type: string
          format: date-time
          nullable: true
        data:
          type: object
          additionalProperties: true
      required: [bookingId, status]
    SummaryPhase:
      type: object
      properties:
        bookingId:
          type: string
          format: cuid
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
        videoUrl:
          type: string
          format: uri
          nullable: true
        notes:
          type: string
          nullable: true
      required: [bookingId, status]
    DebriefingPhase:
      type: object
      properties:
        bookingId:
          type: string
          format: cuid
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
        feedback:
          type: string
          nullable: true
        rating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
      required: [bookingId, status]
    ResultPhase:
      type: object
      properties:
        bookingId:
          type: string
          format: cuid
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
        certificateUrl:
          type: string
          format: uri
          nullable: true
        score:
          type: number
          nullable: true
      required: [bookingId, status]
    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, limit, total, totalPages]
    HealthCheck:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        timestamp:
          type: string
          format: date-time
        database:
          type: string
          enum: [connected, disconnected]
      required: [status, timestamp]
