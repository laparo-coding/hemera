openapi: 3.1.0
info:
  title: Hemera API
  version: 1.0.0
  description: |
    OpenAPI 3.1 specification for all Hemera platform endpoints.
    Covers public, authenticated, admin, webhook, and monitoring routes.
servers:
  - url: http://localhost:3000/api
    description: Local Development
  - url: https://staging.hemera.app/api
    description: Staging Environment
  - url: https://hemera.app/api
    description: Production
security:
  - clerkAuth: []
tags:
  - name: Public
    description: Publicly accessible endpoints
  - name: Auth
    description: Authentication provider information
  - name: Courses
    description: Course participation flows
  - name: Bookings
    description: Course booking management
  - name: Locations
    description: Location management
  - name: Admin
    description: Administrative endpoints
  - name: Webhooks
    description: External webhook receivers
  - name: Monitoring
    description: Application health and metrics
paths:
  /health:
    get:
      tags: [Public]
      operationId: getHealth
      summary: Health check
      description: Returns application health status
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HealthCheck'
  /health/deployment:
    get:
      tags: [Public]
      operationId: getDeploymentHealth
      summary: Deployment health status
      description: Returns deployment-specific health information
      security: []
      responses:
        '200':
          description: Deployment health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
    post:
      tags: [Public]
      operationId: updateDeploymentHealth
      summary: Update deployment health
      description: Updates deployment health status (internal use)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                version:
                  type: string
      responses:
        '200':
          description: Health updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
  /courses:
    get:
      tags: [Public, Courses]
      operationId: listCourses
      summary: List published courses
      description: |
        Returns a paginated list of published courses.
        Rate limit: 100 req/min per IP
      security: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: locationId
          in: query
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: List of courses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          courses:
                            type: array
                            items:
                              $ref: '#/components/schemas/CourseSummary'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until next request allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /courses/next:
    get:
      tags: [Public, Courses]
      operationId: getNextCourse
      summary: Get next upcoming course
      description: Returns the next scheduled published course.
      security: []
      responses:
        '200':
          description: Next course
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CourseSummary'
        '404':
          description: No upcoming courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /courses/{id}:
    get:
      tags: [Public, Courses]
      operationId: getCourse
      summary: Get course details
      description: Returns detailed information about a course
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Course details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Course'
        '404':
          description: Course not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /locations:
    get:
      tags: [Public, Locations]
      operationId: listLocationsPublic
      summary: List locations
      description: Returns all active locations
      security: []
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Location'
    post:
      tags: [Locations]
      operationId: createLocation
      summary: Create location
      description: Creates a new location (admin only)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 200
                address:
                  type: string
                city:
                  type: string
                postalCode:
                  type: string
                country:
                  type: string
                  default: Germany
                latitude:
                  type: number
                  format: double
                  minimum: -90
                  maximum: 90
                longitude:
                  type: number
                  format: double
                  minimum: -180
                  maximum: 180
                description:
                  type: string
                capacity:
                  type: integer
                  minimum: 1
                imageUrl:
                  type: string
                  format: uri
              required:
                - name
                - address
                - city
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Location'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /locations/{id}:
    get:
      tags: [Public, Locations]
      operationId: getLocation
      summary: Get location details
      description: Returns a single location by its identifier.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Location details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Location'
        '404':
          description: Location not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Locations]
      operationId: updateLocation
      summary: Update location
      description: Updates location details (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
                city: { type: string }
                postalCode: { type: string }
                country: { type: string }
                latitude:
                  type: number
                  format: double
                longitude:
                  type: number
                  format: double
                description: { type: string }
                capacity:
                  type: integer
                imageUrl:
                  type: string
                  format: uri
                isActive:
                  type: boolean
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Location'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Locations]
      operationId: deleteLocation
      summary: Delete location
      description: Removes a location when no active courses depend on it.
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Location deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /locations/geocode:
    post:
      tags: [Locations]
      operationId: geocodeAddress
      summary: Geocode address
      description: |
        Converts address to coordinates using external service.
        Rate limit: 100 req/min
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                city:
                  type: string
                postalCode:
                  type: string
                country:
                  type: string
                  default: Germany
              required:
                - address
      responses:
        '200':
          description: Geocoding result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          latitude:
                            type: number
                            format: double
                          longitude:
                            type: number
                            format: double
                          formattedAddress:
                            type: string
                          confidence:
                            type: number
                            format: float
        '400':
          description: Invalid address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/providers:
    get:
      tags: [Auth]
      operationId: getAuthProviders
      summary: List authentication providers
      description: Returns enabled Clerk authentication providers and their URLs.
      security: []
      responses:
        '200':
          description: Providers list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          providers:
                            type: array
                            items:
                              type: object
                              properties:
                                name: { type: string }
                                enabled: { type: boolean }
                                signInUrl:
                                  type: string
                                  format: uri
  /bookings:
    get:
      tags: [Bookings]
      operationId: listBookings
      summary: List user bookings
      description: Returns bookings for authenticated user
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, CONFIRMED, CANCELLED, COMPLETED]
      responses:
        '200':
          description: Bookings list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Booking'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    post:
      tags: [Bookings]
      operationId: createBooking
      summary: Create booking
      description: Creates a booking for the specified course and initiates payment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                courseId:
                  type: string
                  format: cuid
              required:
                - courseId
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Booking'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already booked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
  /my-courses/{bookingId}/preparation:
    get:
      tags: [Courses]
      operationId: getPreparation
      summary: Get preparation phase
      description: Fetches preparation content and status for a booking.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Preparation phase data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PreparationPhase'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    put:
      tags: [Courses]
      operationId: updatePreparation
      summary: Update preparation phase
      description: Updates preparation progress or payload for a booking.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [IN_PROGRESS, COMPLETED]
                data:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Preparation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
  /my-courses/{bookingId}/summary:
    get:
      tags: [Courses]
      operationId: getSummary
      summary: Get summary phase
      description: Returns summary materials provided after course completion.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Summary phase data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SummaryPhase'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    put:
      tags: [Courses]
      operationId: updateSummary
      summary: Update summary phase
      description: Saves summary completion status or notes.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [IN_PROGRESS, COMPLETED]
                notes:
                  type: string
      responses:
        '200':
          description: Summary updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      security:
        - clerkAuth: []
  /my-courses/{bookingId}/debriefing:
    get:
      tags: [Courses]
      operationId: getDebriefing
      summary: Get debriefing phase
      description: Retrieves debriefing questions and current feedback state.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Debriefing phase data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DebriefingPhase'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    put:
      tags: [Courses]
      operationId: updateDebriefing
      summary: Update debriefing phase
      description: Stores debriefing feedback, notes, and rating.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [IN_PROGRESS, COMPLETED]
                feedback:
                  type: string
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
      responses:
        '200':
          description: Debriefing updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      security:
        - clerkAuth: []
  /my-courses/{bookingId}/result:
    get:
      tags: [Courses]
      operationId: getResult
      summary: Get result phase
      description: Provides the final certification data for a booking.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Result phase data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ResultPhase'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    put:
      tags: [Courses]
      operationId: updateResult
      summary: Update result phase
      description: Updates result metrics such as status or score.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [IN_PROGRESS, COMPLETED]
                score:
                  type: number
      responses:
        '200':
          description: Result updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      security:
        - clerkAuth: []
  /my-courses/{bookingId}/resume:
    get:
      tags: [Courses]
      operationId: getResume
      summary: Get resume
      description: Returns metadata for the uploaded participant resume.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Resume details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          url:
                            type: string
                            format: uri
                          filename:
                            type: string
                          uploadedAt:
                            type: string
                            format: date-time
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    post:
      tags: [Courses]
      operationId: uploadResume
      summary: Upload resume
      description: Uploads a resume file for the booking.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        '201':
          description: Resume uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      security:
        - clerkAuth: []
    delete:
      tags: [Courses]
      operationId: deleteResume
      summary: Delete resume
      description: Removes the existing resume asset for the booking.
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: cuid
      responses:
        '200':
          description: Resume deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      security:
        - clerkAuth: []
  /admin/courses:
    get:
      tags: [Admin]
      operationId: adminListCourses
      summary: List all courses (admin)
      description: Returns all courses including unpublished
      parameters:
        - name: includeUnpublished
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Courses list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Course'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
    post:
      tags: [Admin]
      operationId: adminCreateCourse
      summary: Create course
      description: Creates a new course including schedule, pricing, and publication flags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 200
                description: { type: string }
                price:
                  type: integer
                  minimum: 0
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                locationId:
                  type: string
                  format: cuid
                maxParticipants:
                  type: integer
                  minimum: 1
                isPublished:
                  type: boolean
                  default: false
              required:
                - title
                - price
                - startDate
      responses:
        '201':
          description: Course created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Course'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - clerkAuth: []
  /admin/courses/create:
    post:
      tags: [Admin]
      operationId: adminCreateCourseLegacy
      summary: Create course (DEPRECATED)
      deprecated: true
      description: |
        Legacy endpoint. Use POST /api/admin/courses instead. Sunset: 2026-06-01.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Course created (legacy)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      security:
        - clerkAuth: []
  /admin/courses/delete:
    delete:
      tags: [Admin]
      operationId: adminDeleteCourseLegacy
      summary: Delete course (DEPRECATED)
      deprecated: true
      description: |
        Legacy endpoint. Use DELETE /api/admin/courses/{id} instead. Sunset: 2026-06-01.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                courseId:
                  type: string
      responses:
        '200':
          description: Course deleted (legacy)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      security:
        - clerkAuth: []
  /admin/courses/{id}:
    get:
      tags: [Admin]
      operationId: adminGetCourse
