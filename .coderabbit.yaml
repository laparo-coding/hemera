# CodeRabbit Configuration for hemera
# Docs: https://docs.coderabbit.ai/configuration

language: de-DE

reviews:
  # Automatisch bei jedem PR reviewen
  auto_review:
    enabled: true
    # Nur bei ready_for_review PRs (nicht bei Drafts)
    drafts: false
    # Base branches die reviewed werden
    base_branches:
      - main
      - develop

  # Review-Einstellungen
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  collapse_walkthrough: false

  # Aktiviere alle Review-Tools (wie Qodo)
  tools:
    # AST-basierte Code-Analyse
    ast-grep:
      enabled: true
    # Sicherheitsanalyse
    semgrep:
      enabled: true
    # Markdown/Docs Linting
    markdownlint:
      enabled: true
    # Shell Script Analyse
    shellcheck:
      enabled: true
    # GitHub Actions Linting
    actionlint:
      enabled: true
    # YAML Linting
    yamllint:
      enabled: true
    # Biome (für JS/TS)
    biome:
      enabled: true
    # Ruff (Python)
    ruff:
      enabled: false
    # ESLint
    eslint:
      enabled: true
      config_path: "biome.json"
    # Hadolint (Dockerfiles)
    hadolint:
      enabled: true
    # Gitleaks (Secret Detection)
    gitleaks:
      enabled: true
    # Checkov (IaC Security)
    checkov:
      enabled: true
    # Detekt (Kotlin) - nicht relevant
    detekt:
      enabled: false
    # PHPStan - nicht relevant
    phpstan:
      enabled: false
    # Golangci-lint - nicht relevant
    golangci-lint:
      enabled: false
    # Buf (Protobuf) - nicht relevant
    buf:
      enabled: false
    # Cppcheck - nicht relevant
    cppcheck:
      enabled: false
    # Clippy (Rust) - nicht relevant
    clippy:
      enabled: false
    # Oxc (JS/TS)
    oxc:
      enabled: true
    # Sqlfluff (SQL)
    sqlfluff:
      enabled: true
    # Rubocop - nicht relevant
    rubocop:
      enabled: false
    # Swiftlint - nicht relevant
    swiftlint:
      enabled: false
    # PM2 Ecosystem - nicht relevant
    pm2:
      enabled: false

  # Pfade ignorieren
  path_filters:
    - "!**/*.lock"
    - "!**/package-lock.json"
    - "!**/*.min.js"
    - "!**/migrations/**"
    - "!playwright-report/**"
    - "!test-results/**"
    - "!**/generated/**"

  # Review-Anweisungen pro Pfad
  path_instructions:
    - path: "**/*.ts"
      instructions: |
        Fokussiere auf:
        - TypeScript 5.x Best Practices
        - Strikte Typisierung (keine `any` Types)
        - Async/await Error Handling
        - Prisma ORM Query-Optimierungen
        - Rollbar Error Monitoring Integration

    - path: "**/*.tsx"
      instructions: |
        Fokussiere auf:
        - React 18 Patterns (Server Components vs Client Components)
        - Next.js 15 App Router Konventionen
        - Material-UI v5 Best Practices
        - Accessibility (a11y)
        - Performance (dynamic imports, lazy loading)

    - path: "app/api/**"
      instructions: |
        Fokussiere auf:
        - API Security (Input Validation, Auth Checks mit Clerk)
        - Error Responses (proper HTTP status codes)
        - Rate Limiting Überlegungen
        - Zod Schema Validation

    - path: "lib/actions/**"
      instructions: |
        Fokussiere auf:
        - Server Actions Security
        - Clerk Auth Integration
        - Revalidation Patterns
        - Error Handling mit Rollbar

    - path: "prisma/**"
      instructions: |
        Fokussiere auf:
        - Naming Convention (snake_case für DB, camelCase für Prisma)
        - Relationen und Indizes
        - Migration Safety

    - path: "components/**"
      instructions: |
        Fokussiere auf:
        - Komponenten-Wiederverwendbarkeit
        - Props Typisierung
        - Client vs Server Components ("use client" Direktive)
        - MUI Theme Token Verwendung

chat:
  auto_reply: true

# Frühe Zugriffsfunktionen aktivieren
early_access: true

# Knowledge Base - Projekt-spezifisches Wissen
knowledge_base:
  # Lerne aus gemergten PRs
  learnings:
    scope: auto
  # Nutze Issues als Kontext
  issues:
    scope: auto
  # Nutze Jira (falls vorhanden)
  jira:
    project_keys: []
  # Nutze Linear (falls vorhanden)
  linear:
    team_keys: []
